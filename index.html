      mexico:{idx:-10,famgap:2,tags:'Sun escape · Value · Proximity',s:['Texas offers more cultural authenticity than Cancun or Los Cabos resort corridors — the manufactured beach resort experience vs. real Texas culture and landscape','Texas doesn\'t require passport logistics and is in the same time zone as most coastal US cities (Pacific time only two hours off)','Texas food culture is more varied and higher-quality than most Mexico resort corridor dining at comparable price points for authentic experience'],w:['Mexico resort pricing (Cancun, Los Cabos) is genuinely excellent — all-inclusive value in the Riviera Maya frequently undercuts comparable Texas trip costs when properly compared','Mexico\'s beach and resort experience has improved dramatically — Riviera Maya luxury properties are legitimately world-class','For LA travelers especially, Cabo is 2.5 hours by direct flight and feels like a quick warm escape — the logistics are nearly as simple as a domestic flight','The social permission of a &quot;Mexico trip&quot; among LA and SF peer groups is significant — there\'s social currency in Cabo and Tulum that a Texas trip doesn\'t carry in the same circles'],o:['Texas\'s fall/winter outdoor experience (Big Bend in November–March) is the most direct answer to Mexico resort alternatives for the coastal traveler who wants landscape alongside warmth — neither Cancun nor Cabo offer anything like Big Bend as a physical experience','Target coastal travelers who find Mexico resort corridors increasingly generic and commercialized — Tulum\'s gentrification has created a specific segment of coastal travelers looking for the next authentic experience that Texas can credibly serve','The Texas-Mexico border culture experience (Big Bend National Park\'s Rio Grande border, Presidio-Ojinaga crossing, Big Bend Ranch State Park) is itself a border culture experience that no other US state destination can offer'],t:['Mexico resort infrastructure continues to improve — the gap between the manufactured experience and the &quot;authentic&quot; promise is closing rather than widening','Tulum and the Yucatan\'s cenotes have created a new generation of Mexico loyalty among coastal travelers who graduated from Cancun resorts but still default to Mexico','The coastal market\'s social media relationship with Mexico destinations (aesthetic photography, food content) is very strong — Texas doesn\'t benefit from the same aspirational social content ecosystem'],take:'Mexico resort destinations and Texas serve different international traveler segments. The specific opportunity for Travel Texas is not competing with Cancun on warmth or value — it\'s building Texas into the international itinerary for travelers who are already coming to the US and want to understand American culture rather than escape it. Houston is the most ethnically diverse city in America with a restaurant scene that reflects that diversity in ways no other US city does. San Antonio\'s border culture is genuinely distinct from anywhere else in the country. The 2026 World Cup brought a large Latin American football audience to Dallas and Houston for the first time as leisure visitors — that alumni audience iseady in Texas for a match and can be converted into explorers who discover that the Texas across the border is far richer than the resort corridor they might have appended to their US trip.'
      },
      louisiana:{idx:20,famgap:3,tags:'Culture rival · Food · Southern authenticity',s:['Texas\'s total portfolio is categorically larger than New Orleans for a coastal traveler investing in a 4-5 hour flight','Texas\'s food scene is increasingly peer-level to New Orleans for the serious food traveler — Houston has James Beard-recognized restaurants at a density New Orleans can\'t match across a metro','Texas\'s Big Bend and Hill Country in fall/winter add an outdoor chapter that New Orleans fundamentally can\'t offer the coastal traveler','Texas multiple cities give the coastal traveler more to experience per trip investment — a 5-day Texas itinerary can cover more ground than a 5-day New Orleans stay'],w:['New Orleans has stronger and more focused cultural brand recognition with the coastal creative class than Texas\'s multi-product approach delivers','For coastal food travelers, New Orleans\'s Creole cuisine has a specificity and depth that creates a genuine &quot;pilgrimage&quot; feeling — Texas\'s food culture, while excellent, is more diverse and less focused in how it\'s communicated','Coastal travelers who follow food media are specifically directed to New Orleans more often than to Texas — editorial coverage in major food publications consistently favors New Orleans','New Orleans\'s French Quarter and Garden District offer a walkable cultural experience that resonates specifically with coastal urbanites who value pedestrian city life'],o:['Target coastal food travelers who\'ve done New Orleans and want the next chapter of Southern US food discovery — Houston\'s diversity of cuisines is the logical next level of that trip','Texas\'s Hill Country in fall/winter (October–February) is peak season for the landscape and cultural experience — position it as the active outdoor component that completes what New Orleans only begins','Marfa\'s cultural specificity and the Trans-Pecos arts circuit is a direct answer to New Orleans\'s cultural depth for the coastal creative traveler — the aesthetic is completely different and completely unexpected from &quot;Texas&quot;'],t:['New Orleans\'s fall/winter is its best season and its marketing increasingly targets coastal markets with food and culture content specifically','James Beard Foundation\'s continued attention to New Orleans restaurants keeps it at the top of the food travel editorial conversation that reaches coastal readers','The coastal creative class\'s emotional connection to New Orleans has deepened since Hurricane Katrina and the cultural recovery narrative — it\'s a city they feel invested in'],take:'Louisiana wins the coastal cultural fall/winter market on focused identity and food prestige. Texas wins on scale and outdoor variety. The coastal traveler who\'s done New Orleans and is ready for the next chapter of Southern US discovery is one of the highest-probability Texas conversion audiences in the entire competitive landscape — but they need to be given a specific Texas itinerary, not a general invitation to &quot;explore the state.&quot;'
      }
    ,
      california:{idx:-5,famgap:9,tags:'Home state rival · Desert parks · Wine country',
        s:['Texas fall and winter is genuinely excellent — Big Bend in October through March is peak season for arguably the best hiking in the American Southwest that most California travelers have never put on their list','Texas food culture in fall and winter (BBQ season, oyster season, Hill Country harvest) is a specific and authentic American food experience that California\'s own fall doesn\'t offer as a discovery narrative','Texas pricing in fall and winter is significantly lower than California\'s wine country and coastal peak — Napa in October is extraordinarily expensive; Fredericksburg\'s wine harvest is comparable in experience at a fraction of the cost','Houston and Austin\'s fall and winter cultural programming (museum exhibitions, restaurant openings, music season) gives the California cultural traveler a peer-level city experience without California\'s density and cost'],
        w:['California\'s fall is its most beautiful season — Napa harvest, Eastern Sierra fall color, Death Valley\'s comfort season, Dungeness crab — and California travelers know this deeply and personally','Death Valley and Joshua Tree in fall and winter are legitimate world-class desert experiences that directly compete with Big Bend for the California outdoor traveler\'s desert season trip — and require no flight','Napa and Sonoma wine harvest (September–November) is one of the most compelling domestic fall travel experiences in the US and is deeply embedded in California travelers\' annual rhythm','The California traveler\'s fall is tied to specific annual rituals (harvest festivals, Eastern Sierra color, crab season) that are deeply habitual and hard to displace with a Texas alternative'],
        o:['Big Bend in November through January is the most direct competitive answer to Death Valley and Joshua Tree for the California desert traveler — more dramatic, genuinely wilder, equally accessible by flight, and almost entirely unknown to Californians who default to their own desert parks','Position Fredericksburg wine harvest as a discovery alternative to Napa for the California oenophile who finds Napa increasingly expensive and crowded — the German heritage wine story is specific enough to earn media coverage in California food and travel publications','The California traveler who has done Napa harvest every October for a decade and is ready for something genuinely new is one of the highest-probability Texas discovery audiences in the domestic market — they are primed exactly for the pitch brief\'s discovery platform'],
        t:['California\'s fall is structurally the hardest season to compete against for the home-state traveler — Death Valley comfort season, Eastern Sierra, and Napa harvest all pull California travelers in-state with no flight cost','Visit California\'s fall campaign (harvest, color, coast) is among the most effective state tourism seasonal campaigns in the country','Joshua Tree\'s fall and winter visitation has grown dramatically — it now draws over 3 million visitors annually, many of them repeat California regulars with deep loyalty to the park'],
        take:'California fall and winter is the most competitive the home-state rival gets — Death Valley and Joshua Tree directly compete with Big Bend on the desert parks circuit, Napa directly competes with Fredericksburg on wine country, and none of it requires a flight. Texas\'s advantage is the discovery narrative: the California traveler who finally makes it to Big Bend almost universally wishes they had come sooner. The familiarity gap here is as high as anywhere in the tool — and cracking the California domestic market in fall and winter is the single highest-upside opportunity in the entire competitive landscape.'}

  intl:{
    spring:{
      florida:{idx:5,famgap:5,tags:'US icon · Beach · Spring',s:['Texas offers the international traveler a deeper American West experience — Big Bend, the Hill Country, and Marfa provide landscape and culture that Florida fundamentally cannot','Texas\'s food culture (BBQ, Tex-Mex, Gulf Coast seafood) is a specific American food experience that international travelers increasingly seek — Florida\'s resort food is more generic','Texas\'s cultural diversity and distinctiveness (German heritage in the Hill Country, Mexican border culture, African American music heritage) is more varied than Florida\'s resort-dominated experience','Texas\'s direct international flight access (DFW and IAH are major international gateways) is at least as good as Florida\'s for most international origin markets'],w:['Florida\'s global brand recognition (Disney World, Miami Beach, the Keys) is extraordinarily high — for first-time international visitors to the US, Florida is often a fixed itinerary item','Florida\'s weather promise is simple and clear — sunshine and warmth year-round is an easy sell for international travelers that Texas\'s variable and sometimes extreme weather complicates','Florida\'s tourism infrastructure for international visitors (multilingual services, international-standard resorts, established tour operator packages) is more developed than Texas\'s','Florida\'s coastal beauty (Gulf Coast white sand, Keys clarity) is more visually spectacular than Texas\'s Gulf Coast for first-time international visitors who have high expectations'],o:['International travelers on their second or third US trip are the highest-probability Texas discovery audience — they\'ve done Disney and South Beach; they\'re ready for the authentic American West experience Texas offers','The 2026 World Cup group stage in Dallas and Houston delivered the most significant international tourism moment in Texas history — the alumni audience of international visitors who came for the tournament and discovered Texas is now the highest-priority re-marketing target in Travel Texas\'s international strategy','The Route 66 Centennial in 2026 is a specific international draw that gives Texas a cultural heritage anchor with European and Asian travelers who have romantic associations with American road trip culture'],t:['Florida\'s international marketing is backed by one of the largest state tourism budgets in the US — its reach in Europe, UK, and Latin America is extensive and well-developed','For Latin American international travelers, Florida is often a first-choice US destination due to cultural familiarity, Spanish-language services, and established community connections','Florida\'s theme park infrastructure continues to grow — new Epic Universe opening at Universal Orlando in 2025 has created significant new international demand'],
      take:'Florida wins the international first-timer market. Texas\'s competitive window is the international repeat US visitor who\'s ready for an authentic American West experience that no Florida destination provides. The 2026 World Cup and Route 66 Centennial delivered a reason for international travelers to choose Texas that doesn\'t rely on the general &quot;explore Texas&quot; narrative — these should be the pillars of international marketing in 2026.'
      },
      california:{idx:-5,famgap:4,tags:'US icon · Culture · Coast',s:['Texas offers a genuine American West experience that California also claims but from a different angle — the specific cultural identity of the Lone Star state is distinct from California\'s Pacific identity','Texas is generally less expensive than California for accommodation, food, and daily expenses — an international traveler\'s dollar goes further in Texas','Texas\'s hospitality culture (genuine warmth and openness) is frequently cited by international visitors as a positive differentiator vs. California\'s more transactional tourist experience','Texas\'s access to border culture and Mexican-American heritage is a specific cultural dimension that California shares but that Texas delivers more exclusively in its Trans-Pecos and San Antonio chapters'],w:['California\'s international brand recognition is at an entirely different level than Texas — Hollywood, Silicon Valley, Napa Valley, and the Pacific Coast Highway are genuinely iconic at a global scale','For most international travelers planning a first or second US trip, California appears on virtually every itinerary — Texas is much less frequently included without a specific reason to visit','California\'s natural variety (redwoods, Sierra Nevada, Mojave, Pacific Coast) is broader and more visually varied than Texas\'s landscape for most international travelers','LA and San Francisco are gateway cities with extraordinary international flight connectivity and established tourism infrastructure for international visitors'],o:['Position Texas as the essential second chapter of the American West trip — California + Texas as a two-state American experience covers more of what the US distinctively offers than California alone','The 2026 World Cup gave international soccer-following markets a reason to add Texas to a California trip','Target international travelers who have done California (a large and growing cohort) and want the Texas chapter they haven\'t yet found — the pitch brief\'s &quot;what does Texas leave on the table when familiarity stops travelers from looking deeper&quot; applies here as sharply as anywhere'],t:['California\'s global brand recognition is essentially unmatchable on a competitive basis — Texas should partner with it in international marketing rather than compete against it','LA and San Francisco\'s international flight gateway status means international travelers often arrive in California and need a specific reason to reroute to Texas','California continues to invest heavily in international marketing, particularly in European and Asian markets that Travel Texas also targets'],take:'California and Texas are complementary for international travelers rather than directly competitive. The strategic frame should be partnership rather than competition: California + Texas as a two-chapter American experience. The pitch brief\'s discoverability platform has specific value here — international travelers who search for &quot;what to do after California&quot; should find a Texas content ecosystem that makes the two-state trip a natural next step.'
      },
      nyc:{idx:10,famgap:4,tags:'US icon · City · Gateway',s:['Texas provides the American West chapter that New York City\'s urban experience entirely lacks — an international trip that includes both NYC and Texas covers more of what makes America genuinely distinct','Texas\'s direct international flight connectivity (particularly via DFW and IAH) is excellent — many international travelers can reach Texas directly without routing through New York','Texas\'s cultural diversity, food scene, and outdoor landscape offer something genuinely different from NYC rather than a lesser version of the same city experience','Texas is significantly less expensive than New York City for accommodation and daily costs — the international traveler\'s budget goes much further'],w:['New York City\'s global brand recognition is in an entirely separate category — for most international travelers, NYC is a fixed and non-negotiable part of any US trip','NYC\'s cultural density (museums, Broadway, food scene, neighborhoods) creates a complete vacation on its own that absorbs significant trip time and budget','For European travelers especially, New York is the default American city experience — Texas requires a specific reason to be added to an itinerary that already includes New York','NYC\'s holiday experience (Christmas markets, Rockefeller Center) has extraordinary international recognition that Texas\'s holiday programming can\'t approach at the same scale'],o:['Position Texas as the essential American West complement to New York — the city + outdoor + landscape combination that makes an international trip feel complete rather than just urban','The 2026 World Cup brought a cohort of international visitors who combined New York and Texas for the first time — that proven two-city itinerary (Final at MetLife, group stage in Dallas and Houston) is now a template Travel Texas can market directly to international audiences','International travelers on longer US trips (UK and Germany average 9–10 nights) have the time to include Texas alongside NYC — they just need a clear and compelling itinerary suggestion'],t:['NYC\'s gravitational pull on international itineraries means Texas often gets left out due to time and budget constraints after the New York chapter','International flight routing frequently deposits international travelers in New York first — converting them to then fly to Texas requires active marketing presence in the specific origin markets and booking windows','NYC\'s tourism marketing in international markets is well-funded and sophisticated — it has no equivalent budget gap with Travel Texas that could create competitive vulnerability'],
      take:'NYC and Texas are complementary in fall and winter for international travelers. The strategic opportunity is making the two-chapter trip a packaged default rather than an afterthought: three days in New York City, then fly to Houston or Dallas and spend four days on a Texas itinerary that takes them somewhere New York can\'t — the Houston Museum District and its James Beard food scene, a drive through the Hill Country at harvest season, a night in San Antonio at the Pearl. The 2026 World Cup proved this itinerary: international travelers who flew to New York and extended to Texas for group stage matches already had a reason to be in the US; the group stage matches in Dallas and Houston give them the second chapter. Travel Texas\'s job is to make sure that chapter is already written for them before they book.'
      },
      tennessee:{idx:15,famgap:5,tags:'Music culture · US discovery · International',s:['Texas\'s overall variety is significantly larger than Tennessee for an international traveler investing in a long-haul US trip — a week in Texas covers more American distinctiveness than a week in Nashville','Texas\'s music heritage (Austin\'s live music ecosystem, Willie Nelson\'s Texas, border corrido tradition) is as deep as Nashville\'s and more varied in genre — it\'s just communicated less effectively internationally','Texas\'s outdoor chapter (Big Bend, Guadalupe Mountains) gives international travelers a landscape experience that Tennessee\'s Smoky Mountains can\'t replicate at the same dramatic scale','Texas\'s food culture is as strong a draw for international food travelers as Nashville\'s — and is more varied geographically and culturally'],w:['Nashville\'s &quot;Music City&quot; identity is exceptionally clear and well-known internationally — it communicates immediately and simply in a way Texas\'s multi-product approach doesn\'t','Tennessee\'s &quot;Sounds Perfect&quot; campaign has strong international marketing in UK and German markets that directly compete with Texas\'s international targets','The international traveler\'s interest in American music heritage often routes directly to Nashville without ever considering Texas as the older and in many ways deeper version of the same story','Graceland and Elvis Presley\'s cultural impact specifically in UK and German markets gives Tennessee a specific international draw that Texas has no direct equivalent to'],o:['Position Texas as the music destination that Nashville draws from — the roots, the culture, the history that feeds Music City — and make that argument specifically in UK and German markets where music heritage travel is a strong motivator','The 2026 World Cup brought UK and German soccer travelers to Dallas and Houston in significant numbers — that alumni audience is now the highest-probability re-marketing target for converting football visitors into Texas explorers who also discover the music and food culture alongside the matches','Target international music travelers who\'ve been to Nashville and want the deeper, less curated version of American music heritage — Texas delivers that for travelers ready to look'],t:['Tennessee\'s international marketing is specifically targeting the UK and German markets that Travel Texas also identifies as priority targets — the competition is direct','Graceland\'s 2025 Elvis 90th birthday programming generated significant international media coverage that solidifies Tennessee\'s music heritage positioning in international markets','The simplicity of Nashville\'s &quot;Music City&quot; identity is a significant advantage internationally — it communicates across language and culture in a way that Texas\'s more complex multi-product story requires more explaining'],take:'Tennessee wins the international music heritage travel market on simplicity and clarity of message. Texas wins on total depth and variety. The international traveler who\'s been to Nashville and wants the American music origin story hasn\'t been given a Texas answer yet. That\'s the pitch brief\'s discovery platform in direct action: turning recognition (Nashville = American music) into curiosity about where that music actually came from.'
      }
    },
    fallwinter:{
      florida:{idx:0,famgap:4,tags:'Sun escape · Beach · Winter warmth',s:['Texas\'s cultural variety is larger than Florida\'s for international travelers on longer multi-city US trips','Texas\'s fall/winter cultural programming (State Fair, holiday markets) gives international travelers specific events to anchor their trip','Texas\'s food culture as an international draw (BBQ, Tex-Mex, Gulf Coast) is a specific American food experience that international travelers increasingly seek and that Florida\'s resort-dominated fall/winter doesn\'t match'],w:['Florida\'s winter beach experience has exceptional international recognition — Miami Beach and the Florida Keys specifically draw international visitors seeking reliable warmth','Florida\'s Art Basel Miami in December is specifically attended by the international creative class from Europe and Latin America — it creates a luxury travel event with no Texas equivalent in fall/winter','Florida\'s multilingual tourism infrastructure and international community connections (particularly with Latin America and Europe) make it more accessible for international visitors than Texas'],o:['The 2026 World Cup group stage in Dallas and Houston brought an international audience that experienced Texas for the first time — re-marketing directly to that alumni cohort with fall and winter itineraries (Big Bend at peak, Houston\'s cultural season, Hill Country harvest) is the highest-ROI international opportunity currently available to Travel Texas','Position Texas\'s fall/winter as the discovery chapter for international travelers who want to experience authentic American West culture rather than a Florida resort corridor','UK and German travelers who average 9+ nights in the US have the trip length to combine a Texas fall visit with Big Bend\'s peak season — that specific itinerary should be built and promoted directly to the 2026 World Cup alumni audience'],t:['Florida\'s Art Basel and winter programming specifically captures the high-value international creative class traveler that Texas aspires to reach — the competition for this segment is direct','Florida\'s winter marketing budget targeting international markets is substantial and well-established in European and Latin American markets','For Latin American international travelers specifically, Florida\'s cultural familiarity (Spanish-language services, established communities, climate similarity) makes it a default choice that Texas can only displace with a very specific and compelling reason to reconsider'],
      take:'Florida and Texas split the international fall/winter market by traveler type — Florida wins the sun-seeker and Latin American visitor; Texas wins the American West discovery traveler — and the 2026 World Cup group stage in Dallas and Houston delivered the largest single cohort of international first-time Texas visitors in the state\'s history. The re-marketing opportunity is immediate: turning those World Cup visitors into return travelers who discover what Texas offers beyond the match venues is the most concrete and time-sensitive international marketing priority Travel Texas has right now.'
      },
      nyc:{idx:5,famgap:4,tags:'US icon · Gateway · Holiday',s:['Texas\'s fall/winter cultural experience is more varied and less expensive than New York City for international travelers who\'ve already done the NYC holiday experience','Texas\'s Big Bend and Hill Country in fall/winter are peak season experiences that international travelers are much less likely to have done — novelty value is high','Texas\'s direct international connectivity means international travelers can reach Dallas and Houston without routing through New York'],w:['New York\'s holiday experience (Rockefeller Center tree lighting, Christmas markets, Times Square New Year\'s Eve) has extraordinary international recognition — for many international travelers it\'s a once-in-a-lifetime ambition','NYC\'s cultural fall/winter programming (museum exhibitions, Broadway, holiday events) creates a complete trip that absorbs significant international traveler time and budget','International travelers routing through New York on their way to Texas face a two-flight journey that adds friction vs. direct Texas flights from many international origins'],o:['The 2026 World Cup demonstrated that international travelers will combine New York and Texas in a single US trip when given a concrete reason — building on that proven itinerary is the specific opportunity for Travel Texas in international NYC-adjacent markets','International travelers who\'ve done NYC multiple times are a growing and addressable audience — they want the American experience they haven\'t had yet, and Texas is one of the clearest answers','The NYC + Texas two-chapter American trip should be explicitly packaged and marketed in UK and German markets where international visit lengths (9–10 nights) allow for both destinations'],t:['New York\'s holiday tourism is extremely well-funded and marketed internationally — Christmas in New York is among the most globally recognized travel experiences','International travelers who include New York in their trip often find their budget significantly depleted by the time they\'ve done NYC at current pricing — less remains for a Texas extension','NYC\'s cultural pull makes it the priority choice for international travelers\' limited US trip time in fall/winter'],
      take:'NYC and Texas are complementary in fall/winter for international travelers, not directly competitive. The 2026 World Cup proved the Texas + NYC two-chapter trip works — international travelers who combined the Final at MetLife with group stage matches in Dallas and Houston demonstrated there is a real international audience for this itinerary. Travel Texas\'s job now is to re-market directly to that alumni cohort and build the two-city trip into standard international booking packages before that momentum dissipatess extension not just nice-to-have but essential to the trip.'
      },
      california:{idx:-5,famgap:4,tags:'US icon · Coast · Culture',s:['Texas offers a genuinely different American experience from California\'s Pacific identity — the two are complementary rather than competitive for international travelers planning extended US trips','Texas pricing is significantly lower than California for accommodation and daily costs','Texas\'s cultural diversity (border culture, BBQ heritage, German Hill Country, Native American history) is a different chapter from California\'s Pacific/tech/surf identity — both are authentic but neither substitutes for the other'],w:['California\'s international brand recognition (Hollywood, Silicon Valley, wine country, Pacific coastline) is in a completely different category than Texas for international travelers planning first or second US trips','International flight connectivity into LA and San Francisco is vastly superior to Texas\'s connectivity for most international origin markets — more direct routes, more competitive pricing','California\'s nature variety (redwoods, Sierra Nevada, Death Valley, Pacific Coast) is broader and more dramatic for a single-state experience than what most international travelers imagine Texas to offer'],o:['Position Texas + California as the definitive American two-state trip for international travelers — California\'s Pacific identity and Texas\'s Western identity together cover more of what international travelers seek in the US than either state alone','International travel agents and tour operators who package US itineraries should be a specific Texas trade marketing target — building California + Texas itineraries into their standard US packages would be transformative','The 2026 World Cup validated this itinerary: international travelers who routed through LA for Pacific coast time and then flew to Dallas for group stage matches demonstrated the California + Texas two-state trip is a natural and executable international itinerary'],t:['California\'s international marketing budget and established tour operator relationships dwarf Travel Texas\'s international capabilities — the competition for international mindshare is severely asymmetric','International travelers who discover California first (a very large cohort) often find their US trip budget and time fully consumed before considering Texas','California\'s social media content ecosystem (influencer travel, entertainment industry, tech culture) generates extraordinary international reach that Texas\'s equivalent doesn\'t match'],
      take:'California and Texas are best positioned internationally as complements rather than competitors. The 2026 World Cup validated the architecture for a California + Texas two-state international trip that builds on both states\' strengths — California\'s iconic Pacific identity and Texas\'s authentic American West character. This is the international tourism equivalent of the pitch brief\'s central argument: don\'t compete on California\'s terms; reveal the Texas chapter that California can\'t provide.'
      },
      caribbean:{idx:-10,famgap:2,tags:'Sun escape · All-inclusive · International resort',s:['Texas offers more authentic cultural immersion for international travelers who want to experience genuine American culture rather than a resort environment','Texas pricing for a cultural trip is often comparable to mid-range Caribbean resorts when properly compared','Texas doesn\'t require significant additional international logistics for visitors already traveling to the US'],w:['Caribbean resorts serve a specific purpose for international travelers — relaxation and warm-water escape — that Texas cannot replicate','For European and UK international travelers in winter, the Caribbean\'s warmth is a powerful draw that competes on a fundamental climate level','All-inclusive Caribbean pricing is increasingly competitive with multi-city US itineraries when full travel costs are honestly compared'],o:['International travelers who want to combine US exploration with warm weather have a Texas + Gulf Coast chapter that is genuinely undersold as a winter warm-weather experience','The trans-Caribbean travel market from UK and Germany is well-established — repositioning some of that traffic through Texas with a Gulf Coast extension requires building into tour operator packages'],t:['Caribbean resort marketing to UK and German markets is well-funded and established — the brand equity of specific Caribbean destinations (Barbados, St. Lucia, Jamaica) is very strong in these markets','International travelers who choose Caribbean travel are often making a decision about passive relaxation vs. active discovery — and many are choosing relaxation with the clarity that comes from a destination specifically designed for it'],
      take:'Caribbean and Texas winter serve different international traveler needs — relaxation vs. discovery. The competitive opportunity is limited to international travelers who want active US cultural exploration over resort-based relaxation. The 2026 World Cup created a cohort of international travelers in Dallas and Houston who represent the most addressable new audience for Gulf Coast extension itineraries — re-marketing to that group is a specific and immediate opportunitt — a tangible conversion opportunity that doesn\'t exist in any other year.'
      },
      mexico:{idx:-5,famgap:3,tags:'Sun escape · Beach · Value resort',s:['Texas offers genuine cultural immersion rather than a manufactured resort experience — for international travelers who want to experience American culture, Texas is the answer Mexico\'s resort corridors aren\'t','Texas\'s border culture and Mexican-American heritage is itself a bridge experience for international travelers interested in both US and Latin American culture','Texas direct international flight access (DFW, IAH) is competitive with Mexico\'s resort airports for many international origin markets'],w:['Mexico resort destinations (Cancun, Los Cabos, Riviera Maya) offer exceptional value for international travelers — the price-to-sunshine ratio is difficult for Texas to compete with','For European international travelers, the novelty of Mexico (different culture, Spanish language, distinct cuisine) is a draw that Texas cannot replicate for travelers seeking genuine otherness from their home experience','Mexico luxury resort development (Rosewood Mayakoba, Nobu Los Cabos, etc.) has reached world-class standards that create specific luxury draw for international travelers'],o:['International travelers who want the genuine American cultural experience rather than a manufactured resort environment are a specific and addressable audience — they are not choosing between Texas and Mexico on amenity terms','Texas\'s border culture experience in the Trans-Pecos region (Big Bend\'s Rio Grande border, Presidio-Ojinaga crossing) is a specific and authentic US-Mexico border experience that no resort can replicate','The 2026 World Cup brought international travelers to Dallas and Houston who could have appended a Cancun resort week but instead stayed in Texas — that cohort is the clearest proof that the authentic American cultural experience can compete with Mexico resort alternatives for the right international traveler'],t:['Mexico resort destinations continue to invest in infrastructure and luxury development — the quality gap between Texas mid-range accommodation and Mexico luxury all-inclusive resorts is widening','For international travelers already planning a US trip, adding a Mexican resort segment is a well-established travel pattern that tour operators have built into packages','Mexico\'s cultural novelty for European and Asian international travelers is a real draw that Texas, as a US domestic destination, cannot address on the same terms'],
      take:'Mexico resort destinations and Texas serve different international traveler segments. Texas wins for international travelers who want genuine American cultural immersion; Mexico wins for those seeking warm weather and resort experience at value pricing. The 2026 World Cup turned Dallas and Houston into international gateways for the first time at scale — and the international visitors who stayed to explore rather than appending a resort week became advocates for a destination they genuinely didn\'t know.'

// ── BRAND VS DELIVERY ──────────────────────────────────────────────────────
const BRANDS={
  texas:{claim:'&quot;Let\'s Texas&quot; — LET\'S campaign (2025/FY26): an invitation to build personal Texas moments across more than a dozen distinct locations',reality:'Tighter than the gap might suggest for travelers who discover what Texas actually offers — but the brand\'s biggest problem isn\'t delivery gap, it\'s discovery gap. The invitation is warm and genuine; the product delivers when travelers find it. The gap is that familiarity with the Texas icon (cowboy, BBQ, cities) stops most travelers from ever accepting the invitation to the deeper Texas the campaign is trying to reach. A -8.6% visitation decline in 2025 and international headwinds from political climate and border rhetoric compound the challenge. Fredericksburg overtourism and Hill Country crowding on weekends also create a growing gap between the &quot;unspoiled Texas&quot; aspiration and the gridlocked Wimberley reality.',gap:3,verdict:'Moderate gap — discovery problem, not delivery problem',famgap:8},
  florida:{claim:'&quot;Live More Floridays&quot; (launched Sept 2025, Margaritaville partnership) — lifestyle integration, year-round coastal escape',reality:'Delivers on warmth and beaches completely. The Disney/Universal family infrastructure over-delivers on family brand claims. Gap exists between &quot;lifestyle integration&quot; aspiration and the resort-corridor transactional experience most visitors have. Miami\'s Art Basel programming delivers on cultural credibility claim. Hurricane recovery speed (Helene) is stronger than the brand damage it created.',gap:3,verdict:'Moderate gap',famgap:3},
  colorado:{claim:'&quot;Colorado Magic&quot; (launched summer 2024) — strengthens and advances Colorado\'s economy through full-funnel brand approach',reality:'Delivers on outdoor experience and mountain town culture. Growing gap between &quot;responsible stewardship&quot; positioning and overcrowding in Rocky Mountain National Park, Maroon Bells, and core trail systems. Wildfire smoke increasingly complicates the clean mountain air claim in peak summer.',gap:3,verdict:'Moderate gap',famgap:2},
  tennessee:{claim:'&quot;Tennessee Sounds Perfect&quot; (2024 rebrand) — music heritage as primary differentiator, secondary outdoor and culinary pillars',reality:'Music claim delivers completely — Graceland, the Ryman, Grand Ole Opry, and the broader Nashville honky-tonk scene consistently exceed visitor expectations. Gap grows in Nashville specifically: &quot;Sounds Perfect&quot; authentic music identity vs. the bachelorette-party commercial reality of Broadway strip. Smoky Mountains outdoor claim delivers.',gap:4,verdict:'Moderate gap — Nashville commercial drift vs. music authenticity brand',famgap:3},
  louisiana:{claim:'&quot;Feed Your Soul&quot; (ongoing campaign) — food, music, culture, and the New Orleans je ne sais quoi',reality:'Genuinely delivers on the promise — New Orleans remains one of the tightest brand-delivery alignments in US travel. The jazz, food, and culture of the city consistently over-delivers on visitor expectations. Gap exists in the contrast between marketing\'s &quot;off the beaten path&quot; framing for Cajun Country and the increasingly tourist-heavy bayou experience.',gap:2,verdict:'Tight fit',famgap:2},
  newmexico:{claim:'&quot;New Mexico True — The Land of Enchantment&quot; (ongoing, highest 2025 ROI in program history at 9:1)',reality:'One of the most honest and consistently delivered destination brands in the US. Santa Fe and Taos deliver on authenticity, culture, and landscape claims. Growing tension between &quot;unspoiled and true&quot; positioning and Fredericksburg-level crowding in peak season at Santa Fe and White Sands. 2025 campaign most effective ever at 9:1 paid media ROI.',gap:2,verdict:'Tight fit',famgap:2},
  arizona:{claim:'&quot;Vibrant Arizona&quot; (launched 2025, multichannel) — cultural diversity, natural wonders, Indigenous heritage',reality:'New brand is too fresh to fully evaluate delivery. Grand Canyon delivers completely; Sedona delivers with some crowding caveats; Phoenix\'s Scottsdale golf claim is world-class and consistently delivered. Indigenous heritage claim requires careful ongoing validation — the 2,000-Arizonan listening tour that built the brand gives it more authenticity than most government tourism rebrands.',gap:3,verdict:'Moderate gap — brand is new, delivery is generally strong',famgap:3},
  california:{claim:'&quot;The Ultimate Playground&quot; (launched May 2024) — multifaceted adventure, wellness, and entertainment',reality:'Delivers for coastal and city travelers with real gaps. Homelessness crisis, wildfire risk, and cost of living affect experience in ways the &quot;playground&quot; framing doesn\'t address. Pacific Coast Highway delivers; Yosemite in peak season is severely overcrowded. &quot;Ultimate&quot; claim strains against the reality of LA traffic and SF infrastructure challenges.',gap:5,verdict:'Moderate gap',famgap:2},
  pnw:{claim:'Oregon: &quot;Only Slightly Exaggerated&quot; (still current). Washington: no fixed tagline since &quot;Say WA&quot; failed in 2006, currently generic state brand',reality:'Oregon\'s self-aware campaign is well-matched to what Portland and the Oregon coast deliver. Washington\'s absence of a clear brand is an honest reflection of an unsettled identity. PNW wildfire smoke has created a growing gap between the pristine outdoor promise and the August air quality reality in both states.',gap:3,verdict:'Moderate gap',famgap:3},
  caribbean:{claim:'Varies by island — general sun, warmth, and cultural authenticity promises across most island DMOs',reality:'All-inclusive reality is manufactured vs. authentic cultural claims across most resort-corridor Caribbean. The gap between &quot;authentic Caribbean culture&quot; and the resort bubble experience is significant and growing. High-end independent travel options (smaller islands, eco-lodges) deliver more authentically. Mass market resort experience consistently creates the gap.',gap:5,verdict:'Moderate gap',famgap:1},
  mexico:{claim:'&quot;Mexico. Live It To Believe It&quot; — authentic Mexico experience promise across the national campaign',reality:'Resort corridor reality (Cancun, Los Cabos) significantly underdelivers on &quot;authentic Mexico&quot; promises — what most international travelers experience is a well-executed international resort product that happens to be in Mexico. Genuine Mexico delivers completely; what\'s marketed as Mexico frequently isn\'t.',gap:5,verdict:'Moderate gap',famgap:1},
  nyc:{claim:'&quot;With Love + Liberty, New York City&quot; (2024–2026, timed to NYC400, America250, and 2026 World Cup Final)',reality:'Largely delivers on cultural density and iconic experience claims. &quot;Welcoming&quot; messaging is a stretch against the city\'s actual visitor experience for many travelers. Cost, crowds, and safety perception create real gaps. World Cup Final hosting gives the brand a genuine 2026 moment of civic pride that should deliver well.',gap:3,verdict:'Moderate gap',famgap:1},
  charleston:{claim:'No specific tagline — &quot;Where History Lives&quot; informal brand positioning around antebellum architecture and Lowcountry cuisine',reality:'Delivers on charm and food claims consistently — one of the stronger brand-delivery alignments in the American South. Growing gap between &quot;authentic Southern character&quot; positioning and the pace of boutique hotel development and commercial tourism that is beginning to dilute the authentic character.',gap:2,verdict:'Tight fit',famgap:3},
  montana:{claim:'No fixed tagline — new people-first brand platform launched May 2025, replacing &quot;Montana. Naturally&quot;',reality:'Extremely tight brand-delivery alignment — the deliberate decision to move away from slogan-based marketing reflects genuine confidence that Montana\'s wilderness and authenticity don\'t need embellishing. The pandemic migration that brought Californians to Montana has both strengthened the brand\'s advocates and strained the &quot;unspoiled&quot; claim in Bozeman and Whitefish.',gap:2,verdict:'Tight fit',famgap:3},
  hawaii:{claim:'&quot;The Islands of Aloha&quot; — Aloha spirit and warm welcome as the central promise',reality:'Growing gap between the Aloha spirit claim and documented locals-vs-tourists tension, particularly on Maui post-wildfire. Overtourism resentment is structural and widely covered — the &quot;welcome&quot; promise is increasingly contradicted by resident sentiment that is visible to visitors. Some islands deliver much better than others: Kauai\'s authenticity is stronger than Oahu\'s Waikiki.',gap:6,verdict:'Significant gap',famgap:2},
  smoky:{claim:'No unified brand beyond Great Smoky Mountains NP (most visited national park in US)',reality:'The park delivers on natural beauty completely. Gatlinburg and Pigeon Forge commercial tourism creates a significant gap between the pristine mountain promise and the tourist town reality immediately outside the park boundary. Dollywood is its own product and delivers on what it promises independently.',gap:4,verdict:'Moderate gap',famgap:2},
  utah:{claim:'No current unified tagline — transitional period following &quot;Life Elevated&quot; longevity. &quot;The Mighty Five&quot; parks marketing continues',reality:'The Mighty Five parks deliver on dramatic landscape claims completely. Overcrowding at Zion and Arches (permit systems, timed entry requirements) creates a gap between the aspirational wilderness experience and the permit lottery reality. Salt Lake City\'s gateway experience underperforms the natural landscape brand.',gap:4,verdict:'Moderate gap',famgap:2},
  uk:{claim:'VisitBritain: &quot;You\'re Invited&quot; (2023–ongoing) — warmth and invitation to share in British culture',reality:'Delivers on heritage and culture claims strongly. London overtourism creates gap between &quot;welcoming&quot; promise and the tourist-dense reality of peak London in summer. Scotland and Wales deliver more authentically on the uncrowded experience claim.',gap:3,verdict:'Moderate gap',famgap:4},
  germany:{claim:'DZT (German National Tourist Board): &quot;Simply Inspiring&quot; — inspiring experiences across culture, nature, and cities',reality:'Delivers on culture and heritage claims consistently. &quot;Simply&quot; promise occasionally contradicted by German bureaucratic complexity for some travelers. Overtourism in Neuschwanstein, Rothenburg, and Cologne\'s Christmas markets creates seasonal gap between the inspiring promise and overcrowded reality.',gap:3,verdict:'Moderate gap',famgap:4},
  canada:{claim:'Destination Canada: &quot;Keep Exploring&quot; — stewardship and sustainable discovery framing (moved away from consumer tagline)',reality:'Delivers on scenery completely — Banff and Jasper consistently exceed expectations. Growing gap between the &quot;unspoiled&quot; promise and Moraine Lake\'s permit-required, tour-bus-dominated peak season reality. The retreat from a consumer tagline is a tacit acknowledgment of the volume management problem.',gap:4,verdict:'Moderate gap',famgap:4}
};

const S={tab:'swot',origin:'neartexas',season:'spring',comp:'colorado',xAxis:'Familiarity Gap',yAxis:'Brand Recognition'};

function currentCompSet(){return COMPSETS[S.origin]?.[S.season]||null;}
function currentSwot(){try{return SWOTS[S.origin][S.season][S.comp];}catch(e){return null;}}

// ── TAB ROUTING ─────────────────────────────────────────────────────────────
function setTab(t){
  S.tab=t;
  document.querySelectorAll('.ntab').forEach((b,i)=>{
    b.classList.toggle('on',['swot','brand','sandbox'][i]===t);
  });
  if(t==='swot'){
    g('sub').textContent='Identifying what Texas leaves on the table (compared to other destinations) when familiarity stops travelers from looking deeper';
    renderSwotSidebar();renderSwotCanvas();
  }else if(t==='brand'){
    g('sub').textContent='Brand platform vs. traveler reality — and the familiarity gap that separates what travelers assume from what Texas actually delivers.';
    renderBrandSidebar();renderBrandCanvas();
  }else{
    g('sub').textContent='Plot any two competitive dimensions on a live perceptual map. The Familiarity Gap axis is the pitch brief\'s core argument made visual.';
    renderSandboxSidebar();buildSandboxMap();
  }
}

// ── SWOT SIDEBAR ─────────────────────────────────────────────────────────────
function renderSwotSidebar(){
  const cs=currentCompSet();
  let html=`<div class="lbl sec-head" style="color:var(--tx)">01 · Origin Market</div>`;
  ['neartexas','midwestse','coastalfly','intl'].forEach(o=>{
    html+=`<button class="cpill${S.origin===o?' on':''}" onclick="setOrigin('${o}')">${ORIGIN_LABELS[o]}</button>`;
  });
  html+=`<div class="lbl sec-head sdiv" style="color:var(--tx)">02 · Season</div>`;
  const seasons=Object.keys(COMPSETS[S.origin]||{});
  seasons.forEach(s=>{
    html+=`<button class="cpill${S.season===s?' on':''}" onclick="setSeason('${s}')">${SEASON_LABELS[s]||s}</button>`;
  });
  if(cs){
    html+=`<div class="lbl sec-head sdiv" style="color:var(--tx)">03 · Competitor</div>`;
    Object.entries(cs.groups).forEach(([grp,comps])=>{
      html+=`<div class="lbl" style="margin-bottom:4px;margin-top:8px;font-size:9px">${grp}</div>`;
      comps.forEach(c=>{
        html+=`<button class="cpill${S.comp===c?' on':''}" onclick="setComp('${c}')">
          <span class="dot" style="background:${BRIGHT[c]||'#999'}"></span>${DN[c]||c}
        </button>`;
      });
    });
  }
  g('sidebar').innerHTML=html;
}

function setOrigin(o){
  S.origin=o;
  const seasons=Object.keys(COMPSETS[o]||{});
  if(!seasons.includes(S.season))S.season=seasons[0];
  const cs=COMPSETS[o][S.season];
  if(!cs||!cs.comps.includes(S.comp))S.comp=(cs?.comps||[])[0]||'florida';
  renderSwotSidebar();renderSwotCanvas();
}
function setSeason(s){
  S.season=s;
  const cs=COMPSETS[S.origin][s];
  if(!cs||!cs.comps.includes(S.comp))S.comp=cs?.comps?.[0]||'florida';
  renderSwotSidebar();renderSwotCanvas();
}
function setComp(c){S.comp=c;renderSwotSidebar();renderSwotCanvas();}

        <div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--faint);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.09em"><span>Tight</span><span>Moderate</span><span>Significant</span></div>
      </div>
      ${fg?`<div><div class="lbl" style="margin-bottom:4px">Familiarity Gap Score</div>
        <div class="famgap-bar-wrap"><div class="famgap-bar-fill" style="width:${fg*10}%"></div></div>
        <div style="font-size:10px;color:var(--mist)">${fg}/10 · How much unrecognized upside exists relative to what travelers assume</div>
      </div>`:''}
    </div>`;
  }
  html+=`<div class="lbl" style="margin-bottom:9px">All Destinations — Brand Gap Overview</div>`;
  const sorted=[...dests].sort((a,b)=>BRANDS[a].gap-BRANDS[b].gap);
  sorted.forEach(d=>{
    const bdi=BRANDS[d];
    const gc=bdi.gap<=2?'#2D9E6B':bdi.gap<=4?'#B07E28':'#C64B4B';
    html+=`<div class="brand-card" style="cursor:pointer;${S.comp===d?`border-color:${BRIGHT[d]||'#999'};border-width:1.5px`:''}" onclick="setBrandComp('${d}')">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
        <span style="width:9px;height:9px;border-radius:50%;background:${BRIGHT[d]||'#999'};display:inline-block;flex-shrink:0"></span>
        <b style="font-size:12.5px">${DN[d]||d}</b>
        <span style="font-family:'Playfair Display',serif;font-size:10.5px;color:var(--mist);flex:1;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">"${bdi.claim.substring(0,50)}${bdi.claim.length>50?'…':''}"</span>
        <span style="font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:999px;background:${gc}22;color:${gc};white-space:nowrap;flex-shrink:0">${bdi.verdict.split(' — ')[0]}</span>
      </div>
      <div class="brand-bar-wrap" style="margin:0"><div class="brand-bar-fill" style="width:${bdi.gap*14.3}%;background:${gc}"></div></div>
    </div>`;
  });
  html+=`</div>`;
  g('canvas').innerHTML=html;
}

// ── SANDBOX SIDEBAR ────────────────────────────────────────────────────────────
function renderSandboxSidebar(){
  let html=`<div class="lbl sec-head" style="color:var(--tx)">01 · X Axis</div>`;
  AK.forEach(k=>{
    html+=`<button class="cpill${S.xAxis===k?' on':''}" ${S.yAxis===k?'disabled style="opacity:.4;cursor:not-allowed"':''} onclick="setXAxis('${k}')">${k}</button>`;
  });
  html+=`<div class="lbl sec-head sdiv" style="color:var(--tx)">02 · Y Axis</div>`;
  AK.forEach(k=>{
    html+=`<button class="cpill${S.yAxis===k?' on':''}" ${S.xAxis===k?'disabled style="opacity:.4;cursor:not-allowed"':''} onclick="setYAxis('${k}')">${k}</button>`;
  });
  g('sidebar').innerHTML=html;
}
function setXAxis(v){S.xAxis=v;if(S.yAxis===v){S.yAxis=AK.find(a=>a!==v);}renderSandboxSidebar();updateSandboxMap();}
function setYAxis(v){S.yAxis=v;renderSandboxSidebar();updateSandboxMap();}

// ── SANDBOX MAP ─────────────────────────────────────────────────────────────────
function buildSandboxMap(){
  const xd=AXES[S.xAxis],yd=AXES[S.yAxis];
  const toL=s=>50+s*4,toT=s=>50-s*4;
  const gv=[-8,-6,-4,-2,2,4,6,8].map(v=>`<line x1="${toL(v)}" y1="3" x2="${toL(v)}" y2="97" stroke="rgba(255,255,255,0.05)" stroke-width="0.2"/>`).join('');
  const gh=[-8,-6,-4,-2,2,4,6,8].map(v=>`<line x1="3" y1="${toT(v)}" x2="97" y2="${toT(v)}" stroke="rgba(255,255,255,0.05)" stroke-width="0.2"/>`).join('');
  const nclX=xd.s.texas,nclY=yd.s.texas;
  const coQ=(nclY>=0?'t':'b')+(nclX>=0?'r':'l');
  const qNames=getQuadrantNames(S.xAxis,S.yAxis);
  const quadPositions={tl:{left:'3%',top:'7%',anchor:'left'},tr:{right:'3%',top:'7%',anchor:'right'},bl:{left:'3%',bottom:'7%',anchor:'left'},br:{right:'3%',bottom:'7%',anchor:'right'}};
  const qlabels=['tl','tr','bl','br'].map(q=>{
    const isCo=q===coQ;
    const pos=quadPositions[q];
    const posStyle=pos.bottom!==undefined?(pos.anchor==='right'?`right:${pos.right};bottom:${pos.bottom}`:`left:${pos.left};bottom:${pos.bottom}`):(pos.anchor==='right'?`right:${pos.right};top:${pos.top}`:`left:${pos.left};top:${pos.top}`);
    return `<div id="qlabel-${q}" style="position:absolute;${posStyle};pointer-events:none;text-align:${pos.anchor};z-index:20;max-width:28%">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:${isCo?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.38)'};line-height:1.35;letter-spacing:0.01em;${isCo?'text-shadow:0 0 24px rgba(74,123,181,0.8)':''}">${qNames[q]}</div>
    </div>`;
  }).join('');
  const axPills=`
    <div id="ax-xl" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#0D1E35;text-transform:uppercase;letter-spacing:.1em;background:#fff;border-radius:6px;padding:5px 10px;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.18);z-index:25">← ${xd.l.toUpperCase()}</div>
    <div id="ax-xr" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#0D1E35;text-transform:uppercase;letter-spacing:.1em;background:#fff;border-radius:6px;padding:5px 10px;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.18);z-index:25">${xd.r.toUpperCase()} →</div>
    <div id="ax-yt" style="position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#0D1E35;text-transform:uppercase;letter-spacing:.1em;background:#fff;border-radius:6px;padding:5px 10px;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.18);z-index:25">↑ ${yd.r.toUpperCase()}</div>
    <div id="ax-yb" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#0D1E35;text-transform:uppercase;letter-spacing:.1em;background:#fff;border-radius:6px;padding:5px 10px;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.18);z-index:25">↓ ${yd.l.toUpperCase()}</div>`;
  const allDests=Object.keys(C);
  const toks=allDests.map(d=>{
    const col=BRIGHT[d]||'#999';
    const isTx=d==='texas';
    return `<div id="tok-${d}" class="map-tok" style="left:${toL(xd.s[d]||0)}%;top:${toT(yd.s[d]||0)}%">
      <div class="tok-ring" style="color:${col};inset:${isTx?'-18px':'-12px'};opacity:${isTx?0.75:0.32}"></div>
      <div class="tok-dot" style="background:${col};box-shadow:0 0 ${isTx?'36px':'18px'} ${col}${isTx?'AA':'66'},0 0 ${isTx?'14px':'6px'} ${col}${isTx?'77':'44'};width:${isTx?'64px':'48px'};height:${isTx?'64px':'48px'};${isTx?'border:2px solid rgba(255,255,255,0.65)':''}">
        ${isTx?'<span style="font-size:18px">★</span>':''}
      </div>
      <div style="position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Inter',sans-serif;font-size:${isTx?'11.5px':'10.5px'};font-weight:${isTx?700:600};color:rgba(255,255,255,${isTx?0.98:0.86});background:rgba(10,20,8,0.88);border:1px solid rgba(${isTx?'232,101,26':'255,255,255'},${isTx?0.5:0.12});border-radius:5px;padding:2px 7px;pointer-events:none">${DN[d]||d}</div>
    </div>`;
  }).join('');
  g('canvas').innerHTML=`<div class="fadein">
    <div style="display:flex;gap:9px;margin-bottom:11px;flex-wrap:wrap">
      <div class="card" id="chip-x" style="padding:7px 13px;font-size:11.5px;display:flex;align-items:center;gap:7px"><span class="lbl">X →</span><b>${S.xAxis}</b><span style="color:var(--faint);font-size:9.5px">${xd.l} ↔ ${xd.r}</span></div>
      <div class="card" id="chip-y" style="padding:7px 13px;font-size:11.5px;display:flex;align-items:center;gap:7px"><span class="lbl">Y ↑</span><b>${S.yAxis}</b><span style="color:var(--faint);font-size:9.5px">${yd.l} ↔ ${yd.r}</span></div>
      <div class="card" style="padding:7px 13px;font-size:11px;color:var(--mist);display:flex;align-items:center;gap:5px"><span style="color:var(--tx-b)">★</span> Texas anchor · Familiarity Gap axis shows the pitch brief's core argument</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:0;margin-bottom:14px">
      <div style="display:flex;gap:0">
        <div id="ybar" style="width:42px;flex-shrink:0;background:rgba(27,79,138,0.14);border-radius:9px 0 0 0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(27,79,138,0.3);border-right:none;border-bottom:none">
          <span style="font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#1B4F8A;text-transform:uppercase;letter-spacing:.18em;writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap">${S.yAxis}</span>
        </div>
        <div style="position:relative;background:#071628;border-radius:0 14px 14px 0;aspect-ratio:4/3;flex:1;overflow:visible;box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(74,123,181,0.3)">
          <div style="position:absolute;inset:0;border-radius:0 14px 14px 14px;overflow:hidden;background:linear-gradient(145deg,#0D2645 0%,#071628 60%,#030E1C 100%)">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">${gv}${gh}<line x1="50" y1="3" x2="50" y2="97" stroke="rgba(74,123,181,0.25)" stroke-width="0.3" stroke-dasharray="1 0.6"/><line x1="3" y1="50" x2="97" y2="50" stroke="rgba(74,123,181,0.25)" stroke-width="0.3" stroke-dasharray="1 0.6"/></svg>
            ${axPills}
          </div>
          ${qlabels}
          ${toks}
        </div>
      </div>
      <div style="display:flex">
        <div style="width:42px;flex-shrink:0;background:rgba(27,79,138,0.14);border-radius:0 0 0 9px;border:1px solid rgba(27,79,138,0.3);border-top:none;border-right:none"></div>
        <div id="xbar" style="flex:1;height:42px;background:rgba(27,79,138,0.14);border-radius:0 0 9px 0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(27,79,138,0.3);border-top:none;border-left:none">
          <span style="font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#1B4F8A;text-transform:uppercase;letter-spacing:.18em;white-space:nowrap">${S.xAxis}</span>
        </div>
      </div>
    </div>
    <p style="font-size:10.5px;color:var(--faint)">Axis scores are MMGY's directional assessment (−10 to +10). Texas shown as anchor (★). Familiarity Gap: how much of Texas's actual product is systematically underestimated by travelers. Designed to prompt discussion — July 2026 pitch context.</p>
  </div>`;
}

function updateSandboxMap(){
  const xd=AXES[S.xAxis],yd=AXES[S.yAxis];
  const toL=s=>50+s*4,toT=s=>50-s*4;
  Object.keys(C).forEach(d=>{
    const t=g(`tok-${d}`);
    if(t){t.style.left=`${toL(xd.s[d]||0)}%`;t.style.top=`${toT(yd.s[d]||0)}%`;}
  });
  const coQ=(yd.s.texas>=0?'t':'b')+(xd.s.texas>=0?'r':'l');
  const qNames=getQuadrantNames(S.xAxis,S.yAxis);
  const quadAligns={tl:'left',tr:'right',bl:'left',br:'right'};
  ['tl','tr','bl','br'].forEach(q=>{
    const el=g(`qlabel-${q}`);
    if(!el)return;
    const isTx=q===coQ;
    el.style.textAlign=quadAligns[q];
    el.innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:${isTx?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.38)'};line-height:1.35;letter-spacing:0.01em;${isTx?'text-shadow:0 0 24px rgba(74,123,181,0.8)':''}">${qNames[q]}</div>`;
  });
  const xl=g('ax-xl'),xr=g('ax-xr'),yt=g('ax-yt'),yb=g('ax-yb');
  if(xl)xl.textContent=`← ${xd.l.toUpperCase()}`;
  if(xr)xr.textContent=`${xd.r.toUpperCase()} →`;
  if(yt)yt.textContent=`↑ ${yd.r.toUpperCase()}`;
  if(yb)yb.textContent=`↓ ${yd.l.toUpperCase()}`;
  const cx=g('chip-x'),cy=g('chip-y');
  if(cx)cx.innerHTML=`<span class="lbl">X →</span><b>${S.xAxis}</b><span style="color:var(--faint);font-size:9.5px">${xd.l} ↔ ${xd.r}</span>`;
  if(cy)cy.innerHTML=`<span class="lbl">Y ↑</span><b>${S.yAxis}</b><span style="color:var(--faint);font-size:9.5px">${yd.l} ↔ ${yd.r}</span>`;
  const ybar=g('ybar'),xbar=g('xbar');
  if(ybar)ybar.querySelector('span').textContent=S.yAxis;
  if(xbar)xbar.querySelector('span').textContent=S.xAxis;
}

// ── INIT ────────────────────────────────────────────────────────────────────
setTab('swot');
</script>
</body>
</html>
