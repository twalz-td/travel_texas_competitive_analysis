
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Texas Competitive Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tx:#1B4F8A;--tx-b:#4A7BB5;--tx-d:#0F2E56;
  --florida:#1A6B8A;--colorado:#2D6A4F;--tennessee:#7B3F9E;
  --louisiana:#8B3A8B;--newmexico:#B5451B;--arizona:#C77D2A;
  --california:#D4820A;--pnw:#2E6B7A;--caribbean:#1B7FC4;
  --mexico:#8B4513;--nyc:#2C3E50;--charleston:#6B4F2A;
  --montana:#7B5E3D;--hawaii:#1A7F6E;--utah:#8B6914;
  --smoky:#4A6B3D;--ozarks:#5B7A3D;--midwest:#5D4E75;
  --uk:#3D5A80;--germany:#5A5A5A;--canada:#8B0000;
  --ink:#0D1E35;--mist:#4A618A;--faint:#7A9ABE;
  --bg:#EEF3F9;--border:rgba(13,27,10,0.1);--bsoft:rgba(13,27,10,0.06);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:#DDE6F0;color:var(--ink)}
#root{height:100%;display:flex;flex-direction:column;max-width:1340px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,0.18)}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
#nav{display:flex;gap:6px;background:#EEF3F9;border-radius:999px;padding:4px}
.ntab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.10em;text-transform:uppercase;padding:7px 14px;border-radius:999px;border:none;background:transparent;color:var(--mist);cursor:pointer;transition:all .15s}
.ntab.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.12)}
#hero{padding:18px 22px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
#hero h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(17px,2vw,26px);color:#0D1E35;line-height:1.1}
#hero p{font-size:12px;color:#4A618A;margin-top:3px;font-style:italic}
#hero .star-badge{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--border);border-radius:999px;padding:4px 12px;color:var(--mist)}
#view{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;border-right:1px solid var(--border);overflow-y:auto;padding:14px;background:#fff;flex-shrink:0}
#canvas{flex:1;overflow-y:auto;padding:20px;background:var(--bg);min-width:0}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 2px 12px -4px rgba(30,20,10,.10)}
.sec-head{margin-bottom:8px}
.cpill{display:flex;align-items:center;gap:8px;width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:#F4F7FB;font-size:12.5px;font-weight:500;color:var(--mist);cursor:pointer;transition:all .15s;text-align:left;font-family:'Inter',sans-serif;line-height:1.3;margin-bottom:5px}
.cpill:hover{border-color:var(--faint);color:var(--ink)}
.cpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cpill .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sdiv{border-top:1px solid var(--bsoft);padding-top:12px;margin-top:6px}
.fadein{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.gauge-wrap{position:relative;height:8px;border-radius:999px;background:linear-gradient(90deg,#1B4F8A 0%,#7A9ABE 52%,#C64B4B 100%);border:1px solid var(--bsoft);margin:8px 0}
.gauge-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .4s ease}
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.swot-box{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px}
.swot-box ul{list-style:none;padding:0;margin-top:7px}
.swot-box li{font-size:12.5px;color:var(--ink);padding:4px 0 4px 14px;position:relative;line-height:1.55;border-bottom:1px solid var(--bsoft)}
.swot-box li:last-child{border-bottom:none}
.swot-box li::before{content:'–';position:absolute;left:0;color:var(--faint)}
.map-tok{position:absolute;transform:translate(-50%,-50%);z-index:10;transition:left .5s ease-in-out,top .5s ease-in-out;overflow:visible}
.tok-ring{position:absolute;inset:-14px;border-radius:50%;border:1.5px solid currentColor;opacity:.38;pointer-events:none}
.tok-dot{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#fff;letter-spacing:.02em;user-select:none;position:relative;z-index:1}
.brand-card{background:#fff;border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px}
.brand-bar-wrap{height:7px;border-radius:999px;background:#EEF3F9;border:1px solid var(--bsoft);margin:7px 0;overflow:hidden}
.brand-bar-fill{height:100%;border-radius:999px;transition:width .4s ease}
.famgap-bar-wrap{height:7px;border-radius:999px;background:#EEF3F9;border:1px solid var(--bsoft);margin:4px 0;overflow:hidden}
.famgap-bar-fill{height:100%;border-radius:999px;background:#4A7BB5;transition:width .4s ease}
</style>
</head>

pete with','American Airlines and Southwest\'s expanded Caribbean routes from Texas metros make the Caribbean increasingly accessible at competitive prices'],take:'The Caribbean wins when the Midwest traveler needs to stop. Texas wins when they want to come back with something. A Midwest family that spends Thanksgiving week in San Antonio — River Walk holiday lights, missions circuit, Pearl District food, a day trip to the Hill Country — returns with a trip that has texture and story. That\'s a different psychological product from an all-inclusive resort week. The specific argument Travel Texas hasn\'t made loudly enough: San Antonio in November is one of the most beautiful and genuinely undervisited holiday experiences in the United States, and it\'s a 2-3 hour flight from Chicago.'},

        tags:'Culture rival · Music city · Spring break',
        s:['Texas\'s spring outdoor experience — Hill Country wildflowers, Big Bend, Guadalupe Mountains — is entirely unavailable in Tennessee and offers a genuinely distinct experience from Nashville\'s urban-only offering','Texas\'s total portfolio (city + desert + coast + wine country + music + food) is more varied than Tennessee\'s music-anchored brand, giving Midwest/Southeast travelers more reasons to return','Texas\'s spring weather is reliably comfortable before the heat arrives; Tennessee\'s spring is beautiful but weather-variable','Texas\'s food culture — BBQ, Tex-Mex, Gulf Coast seafood, border cuisine — is arguably as strong a food travel draw as Nashville\'s and is more geographically varied'],
        w:['Tennessee\'s &quot;Sounds Perfect&quot; campaign (launched 2024) is exceptionally well-crafted — it has created a clear emotional identity around music, mountains, and Southern food that resonates powerfully in the Midwest and Southeast','Nashville\'s social media virality continues to be extraordinary — it generates more user-created content than any other US destination for the 25–45 demographic that both Tennessee and Texas are competing for','Gatlinburg/Pigeon Forge gives Tennessee a family spring break option that Texas\'s equivalent market (the Gulf Coast) is less well positioned to own','For Atlanta, Charlotte, and the Southeast, Nashville is a 3–6 hour drive; Texas is a 10–14 hour drive or a flight — the access gap is real'],
        o:['The Midwest/Southeast traveler who has done Nashville two or three times is one of the highest-probability Texas discovery audiences — they are primed for a new chapter of the same cultural trip energy','Texas\'s spring should own the &quot;Bluebonnet Trail&quot; narrative as aggressively as Nashville owns the honky-tonk narrative — it\'s equally specific, equally photogenic, and far less discovered','Position the Texas music circuit (Austin, Luckenbach, Gruene Hall, Marfa\'s collective arts scene) as the answer to Nashville\'s music identity — more varied, more authentic, less commercial'],
        t:['Tennessee\'s marketing budget and momentum are significant — $30.6 billion in visitor spending in 2024 represents extraordinary growth that Texas needs to respect as a competitor','CMA Fest and other Nashville anchors create reliable annual event traffic that pulls from the exact Midwest/Southeast markets Texas is targeting','Tennessee\'s combination of Nashville + Smoky Mountains gives it a city-plus-nature story that is increasingly competitive with Texas\'s portfolio narrative'],
        take:'Tennessee and Texas are competing for the same Midwest/Southeast traveler who wants culture, food, and a city they\'ve heard is worth visiting. Tennessee wins on simplicity and social media virality; Texas wins on total variety and outdoor scale. The pitch brief\'s familiarity argument is perfectly calibrated for this competition: the Midwest traveler thinks they know what a Texas trip looks like, and &quot;Nashville with boots&quot; isn\'t the version of Texas that would actually change their mind.'
      },
      florida:{idx:10,famgap:4,tags:'Spring break · Beach · Sun escape',s:['Texas\'s spring cultural experience is more varied than Florida\'s beach-dominant spring offering','Texas\'s Hill Country and Big Bend have no Florida equivalent — the Midwest/SE traveler who wants genuine outdoor adventure will find more in Texas than in Florida','Texas\'s food culture (specifically BBQ and Tex-Mex) is a stronger &quot;food trip&quot; argument than Florida\'s spring offer, which is more resort and theme-park oriented','Texas spring pricing is generally lower than Florida\'s peak spring break pricing'],w:['Florida is the dominant spring break destination for the Midwest/SE market and has been for generations — family habits are deeply embedded','Florida\'s Gulf Coast and Keys offer genuinely beautiful warm-water beach experiences that Texas\'s Gulf Coast can\'t match on visual drama','Disney World and Universal Studios give Florida a family spring break product that is incomparable','Florida\'s &quot;Live More Floridays&quot; campaign is actively targeting the Midwest and Southeast with spring content'],o:['Texas spring should target the Midwest/SE family that has &quot;done Disney&quot; and wants an active, discovery-oriented spring trip — Big Bend + Hill Country + San Antonio as a cultural adventure trip','Position Texas as the answer to Florida spring break fatigue — growing numbers of Midwest families report finding Florida too crowded and too expensive in March–April','Texas\'s wildflower season has the visual appeal to compete with Florida\'s beach imagery on social media if it were as consistently amplified'],t:['Florida\'s spring marketing dominance from the Midwest is structural — it has more direct flights, more brand recognition, and more family infrastructure than Texas can match','The Disney/Universal spring trip is essentially a fixed behavior pattern for Midwest families with young children — it\'s not a consideration set decision','Spring break hotel inventory in Florida is heavily discounted early to secure family bookings that Texas\'s market hasn\'t developed the same infrastructure for'],take:'Florida wins the Midwest/SE spring break market for families. Texas\'s spring opportunity is the growing segment of Midwest travelers who find Florida too crowded and too commercial — the family or couple ready for an active, discovery-oriented trip. That audience exists and is growing; Texas just needs to show them what spring in Texas actually is.'
      },
      colorado:{idx:0,famgap:7,tags:'Adventure rival · Mountain · Outdoor spring',s:['Texas spring is warmer and more accessible for a Midwest/SE traveler who doesn\'t want mountain weather uncertainty — April in the Rockies can still mean snow and cold passes','Texas\'s cultural variety gives the Midwest/SE traveler more to fill a week — mountain towns + city + outdoor experiences vs. Colorado\'s more singular mountain focus in shoulder season','Texas\'s flight accessibility from the Southeast (Atlanta, Charlotte) is competitive with Denver for many Midwest/SE markets'],w:['Colorado\'s spring outdoor identity (hiking trails opening, white water rafting beginning, mountain biking season starting) is deeply embedded in the Midwest market\'s travel aspirations','Denver as a gateway city is well-established for the Midwest market — direct flights from Chicago, Atlanta, and Charlotte are well-served and often competitively priced','Colorado\'s &quot;Colorado Magic&quot; campaign (2024) has specifically targeted Midwest and Southeast markets with spring content'],o:['Texas\'s spring is the competitive window to make the outdoor adventure argument — Guadalupe Mountains in April rivals any Colorado front-range hiking experience for a Midwest traveler who hasn\'t been to either','Big Bend\'s spring shoulder season (February–April) is peak visitation for a reason — it should be the centerpiece of a spring campaign targeting Midwest markets who\'ve been to Colorado and are ready for something new','Position Texas as the outdoor adventure destination the Midwest traveler hasn\'t thought to put on their list yet'],t:['Colorado\'s mountain spring identity is sufficiently established that it gets automatic consideration from Midwest adventure travelers — Texas is rarely in the same category in their mental map','Colorado\'s Ikon Pass creates a loyalty system that anchors repeat ski visitors and converts them into spring/summer return visitors','Colorado tourism\'s 8.2% year-over-year growth in 2025 reflects continued momentum in the Midwest and Southeast markets Texas needs to reach'],
      take:'This matchup perfectly illustrates the pitch brief\'s core problem: a Midwest adventure traveler planning a spring trip is very unlikely to put Texas in their consideration set next to Colorado. The product argument isn\'t the problem — Big Bend vs. Rocky Mountain National Park is not an obvious loss for Texas. The familiarity gap is the entire problem. Nobody has told this traveler that West Texas exists as an outdoor adventure destination.'
      },
      louisiana:{idx:15,famgap:3,tags:'Culture rival · Food city · Short fly',s:['Texas\'s portfolio is dramatically more varied than New Orleans as a single-city destination for the Midwest/SE traveler investing in a flight','Texas\'s BBQ culture has national credibility now — it\'s a legitimate food travel draw for the Midwest market that equals New Orleans\'s Creole identity in category recognition','Texas\'s spring outdoor chapter (Hill Country, Big Bend) gives the Midwest/SE traveler a trip component that New Orleans can\'t offer','Texas across multiple cities offers more variety per dollar for a longer trip'],w:['New Orleans is one of the most beloved city brands in the US — the Midwest market\'s emotional connection to it is genuine and deep','Jazz Fest creates one of the most powerful event-travel draws in American tourism, pulling specifically from the Midwest and Southeast in late April/early May','New Orleans has a &quot;nothing else is quite like it&quot; distinctiveness that is hard to argue against even on product merit','Midwest travelers who\'ve been to New Orleans multiple times maintain loyalty at a rate that few destinations match'],o:['Target Midwest/SE travelers who\'ve been to Jazz Fest and are looking for the next chapter of that cultural discovery trip — Texas has a credible answer','The Texas food circuit (Franklin Barbecue, Hugo\'s, Brennan\'s of Houston, La Gloria) is increasingly recognized nationally — position it as a peer-level food trip to New Orleans','The Austin music + Hill Country wildflowers spring combination is a directly competitive product for the Midwest cultural trip and is dramatically less well-known'],t:['New Orleans\s cultural gravity for the Midwest market is deeply embedded — it\'s often the first &quot;bucket list&quot; destination Midwest travelers tick before considering elsewhere in the South or Southwest','Jazz Fest\'s 2025 and 2026 lineup has continued to be strong — the event anchor maintains relevance with the exact demographic Texas is competing for','Louisiana\'s marketing has improved significantly and is actively targeting Midwest markets with spring content'],take:'Louisiana wins on food prestige and the focused identity of New Orleans in fall. Texas\'s answer is not one restaurant or one city — it\'s the BBQ pilgrimage (Franklin, Snow\'s, Louie Mueller, Kreuz Market) as a fall food trip that food media has validated nationally but Travel Texas has never packaged for the Midwest market; plus Houston\'s James Beard-recognized restaurant density in October when the city\'s cultural season opens; plus Fredericksburg\'s harvest season for the wine traveler who finds Napa in October too expensive. The Texas fall food trip exists. It just hasn\'t been told as a single compelling narrative yet.'
      },
      charleston:{idx:20,famgap:4,tags:'Culture rival · Southern charm · Weekend fly',s:['Texas\'s total scale and variety is orders of magnitude beyond Charleston/Savannah as a single-destination experience','Texas\'s food culture — specifically BBQ, Tex-Mex, and Gulf Coast seafood — is as defensible as Lowcountry cuisine as a food travel draw','Texas\'s outdoor spring component (Hill Country, Big Bend) gives it a dimension that Savannah and Charleston, as purely urban/coastal experiences, cannot compete with','Texas pricing is generally lower than Charleston\'s premium boutique hotel market'],w:['Charleston and Savannah are among the most photogenic small cities in the US — their visual identity (antebellum architecture, Spanish moss, cobblestone streets) is immediately distinctive on social media','The Midwest market has a specific romantic and nostalgic affinity for the Antebellum South aesthetic that Texas\'s landscape doesn\'t offer','Charleston\'s food scene has national recognition (Sean Brock\'s legacy, multiple James Beard recognition) that creates a specific food travel draw','For Midwest travelers, the flight to Charleston or Savannah is often comparable to or cheaper than the flight to Texas'],o:['Texas\'s Galveston Victorian architecture and historical depth is largely unknown and could serve a similar &quot;Southern historical charm&quot; function for travelers who discover it','San Antonio\'s historic missions district and River Walk are genuinely among the most beautiful urban environments in the southern US — they compete favorably with Charleston on walkability and charm','Target Midwest travelers who\'ve done Charleston and want to scale up to a multi-product trip that includes outdoor adventure alongside cultural charm'],t:['Charleston\'s social media presence and food/travel media coverage is extraordinary relative to its size — it generates awareness disproportionate to its population','The Midwest romantic travel market (couples, anniversaries) defaults to Charleston and Savannah as the southern charm answer — Texas is rarely considered in this category','Charleston and Savannah\'s boutique hotel and inn market creates a luxury small hotel experience that Texas\'s equivalent (Fredericksburg, Marfa) hasn\'t fully matched at scale'],take:'Charleston and Texas are competing for different versions of the same Midwest traveler. Charleston wins the romantic Southern charm trip. Texas wins the varied adventure trip. The competitive opportunity is the Midwest couple who\'s done Charleston and Savannah and is ready for something bigger — and hasn\'t yet discovered that Marfa and the Hill Country offer the same aesthetic sophistication at a completely different scale.'
      }
    },
    summer:{
      colorado:{idx:-15,famgap:8,tags:'Heat escape · Mountain · Summer',s:['Texas\'s Gulf Coast summer is a real product — for the Midwest/SE fly market that wants beach, Texas coast is competitive on water temperature and much cheaper than flying to Florida','Texas\'s cultural summer programming (outdoor concerts, festivals in cooler evening hours, Austin summer culture) gives the urban traveler a reason to visit that Colorado\'s outdoor-dominant summer doesn\'t always match for non-hikers','Texas flight prices from Midwest/SE markets are often competitive with Denver flights, making total trip cost similar when accommodation is included'],w:['Colorado\'s summer is its defining competitive window from the Midwest/SE — mountain lakes, wildflower meadows, 75°F days and 55°F nights create a weather argument Texas cannot win','Denver\'s urban sophistication plus mountain access gives the Midwest summer traveler a city-plus-nature story that Austin-plus-coast is still building toward','Colorado\'s 8.2% year-over-year growth in 2025 reflects genuine momentum with the Midwest summer market that Texas has not matched'],o:['Texas should cede the &quot;escape the heat&quot; summer argument and own a different summer story: authentic coastal culture, Gulf fishing, BBQ culture as an experience, and the specific Texas summer identity that doesn\'t require 65°F temperatures to be compelling','Target the Midwest summer traveler who finds Colorado hiking physically demanding and wants a more culturally immersive summer trip — Texas\'s BBQ trail, music summer, and Gulf Coast can serve that segment','Big Bend is off the table in summer; the Guadalupe Mountains in June are still accessible and largely unknown to the Midwest market'],t:['Colorado\'s summer marketing is well-targeted at Midwest markets and has been for decades — the trip pattern is embedded across multiple demographic cohorts','The Midwest summer trip to Colorado often becomes multi-generational — families with multiple age groups find it easier to satisfy everyone in the mountains than at a Texas beach','Colorado\'s outdoor infrastructure (trail systems, camping, resort towns) is significantly more developed than Texas\'s equivalent for a summer fly market trip'],take:'Colorado wins summer from the Midwest/SE market. Texas\'s honest summer play is the Gulf Coast + cultural experience story — not the &quot;also a mountain destination&quot; story it can\'t credibly tell in July. The competitive opportunity is carving out a Texas summer identity that doesn\'t compete on weather and wins on culture, food, and coastal authenticity instead.'
      },
      florida:{idx:5,famgap:5,tags:'Beach rival · Theme parks · Summer',s:['Texas Gulf Coast is less expensive than Florida\'s summer peak and offers similar water temperatures','Texas\'s summer cultural programming (Austin, San Antonio, Houston) competes with Florida\'s city experience for the urban summer traveler','Texas lacks Florida\'s theme park congestion in summer — for travelers seeking authentic coastal experience, Texas\'s lower density is an argument'],w:['Florida dominates the Midwest summer family market — Disney, Universal, and the Gulf Coast beach product are deeply embedded across generations','Florida flight prices from the Midwest are often lower than Texas because of higher competition on those routes','Florida\'s family entertainment infrastructure is incomparably more developed for the family summer trip that drives the largest summer travel spending segment'],o:['Position Texas\'s Gulf Coast summer as the &quot;authentic beach&quot; alternative to Florida\'s commercialized resort experience','Texas summer for young adults (Austin music, Houston culture, Gulf fishing) has a specific draw that Florida\'s theme-park-oriented summer doesn\'t serve as well','Target Florida-fatigued Midwest families — a growing segment that finds Florida summer too crowded and too expensive for what they get'],t:['Florida\'s summer marketing is backed by an enormous budget that specifically targets Midwest families','Florida\'s new &quot;Live More Floridays&quot; 2025 campaign is explicitly designed to extend its appeal beyond the peak sun-seeker to a broader leisure traveler','The Florida summer trip is generational — Midwest families have been going for decades and the habit is deeply embedded'],take:'Florida wins the Midwest summer family market. Texas\'s competitive window is the growing segment of Midwest travelers who\'ve outgrown the Disney trip and want something more experiential. Gulf Coast fishing, Austin live music, Hill Country evening drives — those experiences aren\'t competing with Florida on Florida\'s terms. They\'re a different version of summer that requires active discovery.'
      },
      pnw:{idx:5,famgap:6,tags:'Cool escape · Outdoor · Urban culture',s:['Texas flight prices from the Midwest are often lower than Pacific Northwest — Seattle and Portland have fewer direct Midwest connections than Dallas or Houston','Texas\'s food and music culture in summer (Austin, Houston\'s James Beard-recognized restaurant scene) is increasingly competitive with Portland and Seattle\'s well-established culinary scenes','Texas\'s warm summer evenings and outdoor culture — porch culture, live music, evening festivals — create a specific summer identity that the PNW\'s rainier summer doesn\'t replicate'],w:['The Pacific Northwest\'s summer is genuinely cool and spectacular — Mount Rainier, Olympic Peninsula, Cascades, and coastal access give it outdoor variety Texas\'s summer can\'t match in the heat','Portland and Seattle\'s culinary and creative culture scenes have national prestige and strong resonance with Midwest young professional travelers','PNW\'s &quot;cool&quot; brand factor among 25–40 Midwest travelers is significant — it carries cultural cachet Texas hasn\'t built with that demographic'],o:['Target Midwest young professionals who want a culturally sophisticated summer trip — Houston and Austin\'s food scenes are now peer-level to Portland and Seattle for travelers who investigate before they go','Texas\'s summer night culture (late outdoor dining, music, festivals) is actually well-suited to the 25–40 traveler who finds PNW summers too outdoor-focused','Texas\'s Gulf Coast beach day plus Austin cultural night combination is a distinctly warm-weather experience the PNW can\'t offer'],t:['PNW\'s brand cachet with younger Midwest travelers is at peak — Portland and Seattle carry a cultural prestige that Texas hasn\'t built with under-40 Midwest travelers','Pacific Northwest outdoor infrastructure is excellent and well-promoted to the Midwest market','Wildfire smoke is a growing concern in both regions — neither has a clear advantage, but PNW smoke awareness is greater nationally'],take:'PNW and Texas are competing for the Midwest\'s young professional summer trip. PNW wins on outdoor cool and food prestige; Texas wins on warmth, cost, and the city + coast combination. The familiarity gap is real: young Midwest travelers who think of Texas as conservative, hot, and flat are missing the Austin + Hill Country + coast summer that would genuinely compete with what Portland offers. That\'s a brand and discoverability problem, not a product problem.'
      },
      smoky:{idx:25,famgap:3,tags:'Mountain rival · Family · Drive from SE',s:['Texas\'s overall outdoor and cultural portfolio is vastly richer than the Smokies — for the Midwest fly market, Texas offers more per visit investment','Texas\'s Hill Country and coastal summer (for travelers who avoid the extreme inland heat) is competitive on scenery and significantly less crowded than Gatlinburg in peak summer','Austin and San Antonio give Texas strong urban anchors that Gatlinburg/Pigeon Forge cannot match'],w:['The Smoky Mountains have the most visited national park brand in the US — Great Smoky Mountains NP drives enormous automatic consideration from the Southeast and Midwest','Dollywood\'s summer programming gives the Smokies a family entertainment anchor that Texas doesn\'t have an equivalent to','The Southeast drive market (Atlanta, Charlotte) reaches the Smokies much more easily than it reaches Texas — for that sub-segment, geography is decisive'],o:['Texas should not compete with the Smokies for the Southeast drive market — the geography is unfavorable. The Midwest fly market is where the competitive argument can be made','For Chicago and St. Louis travelers, Texas is a competitive flight distance to Knoxville — the comparison should be made explicitly when targeting Midwest fly-market families','Texas\'s Hill Country character (German heritage towns, wine country, wildflowers) offers something the Smokies\' Appalachian character doesn\'t — a specific cultural add-on to outdoor experience'],t:['Smoky Mountains summer crowd management issues are growing — but overcrowding paradoxically reinforces the brand\'s desirability rather than creating competitive opportunity for Texas','Tennessee\'s broader brand platform under &quot;Sounds Perfect&quot; is now actively building the Smokies into a multi-product state tourism story that increases competitive pressure','Dollywood continues to invest in new attractions that anchor family summer consideration in ways Texas can\'t easily displace'],take:'The Smokies are not Texas\'s primary competitive target in summer — the geography doesn\'t favor a direct competition. But for the Midwest fly market specifically, Texas\'s summer package (Austin + Hill Country + coast) is a credible alternative to the Smokies\' nature-dominant offering, especially for travelers who want more cultural programming alongside their outdoor experience.'
      }
    },
    fallwinter:{
      florida:{idx:-5,famgap:4,tags:'Sun escape · Winter warmth · Holiday',s:['Texas\'s fall cultural programming (State Fair, Halloween events, holiday markets in Fredericksburg and San Antonio) is genuinely distinctive and offers more variety than Florida\'s fall calendar for the Midwest traveler','Texas Hill Country in fall is legitimately beautiful — October temperatures and harvest season give it a seasonal appeal that Florida\'s year-round sameness can\'t compete with on novelty','Texas pricing in fall/winter is generally lower than Florida\'s peak season pricing'],w:['Florida\'s winter is its best season and it\'s backed by the largest state tourism marketing budget in the US','Florida\'s warmth is a decisive draw for Midwest travelers experiencing winter in November through February — the weather argument is almost impossible to overcome','The Midwest\'s deep Florida winter habit (retirees, family visits, holiday beach) makes it structural competition rather than an addressable consideration set'],o:['Texas\'s Gulf Coast in November–January is genuinely warm (60–75°F), uncrowded, and affordable — position it as the &quot;smart&quot; Florida alternative for Midwest travelers who\'ve done Florida and want something less commercial','San Antonio\'s River Walk holiday experience is a specific and beautiful fall/winter Texas chapter that Midwest travelers almost universally don\'t know about','Target Midwest couples and empty-nesters specifically — they are more likely to try something new than families with established Florida patterns'],t:['Florida\'s winter dominance from the Midwest is structural and well-funded — &quot;Live More Floridays&quot; 2025 is specifically designed to lock in Midwest winter travel at scale','Florida\'s retiree and snowbird market from the Midwest is essentially captive — extended winter stays in Florida communities are a fixed behavior Travel Texas cannot address','Florida\'s spring training market creates a unique late-winter draw that Texas hasn\'t matched on the specific sports travel circuit'],
      take:'Florida wins the Midwest winter travel market. Texas\'s competitive window is the Midwest couple or empty-nester who\'s done Florida and wants a fall or shoulder-season alternative with more cultural texture. The Hill Country in October and San Antonio\'s River Walk in December are specific and defensible arguments — they just require the traveler to have discovered that Texas offers them.'
      },
      tennessee:{idx:10,famgap:5,tags:'Culture rival · Music · Fall',s:['Texas\'s fall cultural portfolio (State Fair of Texas, Austin City Limits Music Festival, San Antonio Fiesta de las Flores equivalent programming) is competitive with Tennessee\'s fall music identity','Texas food culture in fall — BBQ season, Gulf Coast oyster season opening, Texas wine harvest — is as strong a food travel draw as Nashville\'s fall dining scene','Texas Hill Country in October offers a season-specific visual experience that Tennessee\'s Smokies foliage rivals but Houston\'s or Dallas\'s BBQ trail counters on cultural draw'],w:['Tennessee\'s &quot;Sounds Perfect&quot; fall campaign is well-executed and specifically targets the Midwest market with music, mountains, and foliage messaging','ACL Music Festival (Austin) competes directly with Tennessee\'s fall music draws but is more of a music industry event than a general travel anchor','Nashville\'s continued growth as a bachelorette/social travel destination maintains its strong social media presence with exactly the Midwest demographic Texas needs to reach'],o:['Austin City Limits Music Festival is a specific competitive answer to Tennessee\'s fall music identity — it should be more prominently positioned in Midwest fall marketing','Texas\'s fall food circuit (new restaurant openings in Houston and Dallas typically cluster in fall) gives the Midwest food traveler a specific reason to visit in a season they haven\'t considered','The post-ACL visitor who extends their Austin trip into the Hill Country is an underdeveloped retention opportunity that would also build the hill country\'s Midwest awareness'],t:['Tennessee\'s fall brand is well-established and its Smoky Mountains foliage draw is increasingly prominent in Midwest travel media','Nashville\'s holiday programming (light shows, events) creates a winter extension of its fall brand that Texas hasn\'t matched for the Midwest market','Tennessee\'s marketing budget for fall specifically is growing — it\'s treating it as its competitive anchor season'],
      take:'Tennessee and Texas are competing for the same Midwest traveler who wants culture, food, and a music city they\'ve heard about. Tennessee wins on brand simplicity and social media virality. But the Midwest traveler who builds their trip around Nashville\'s honky-tonks hasn\'t been told that Gruene Hall — the oldest dance hall in Texas, still running the same beer-and-live-music format since 1878 — predates the Ryman and feeds the same cultural impulse at a fraction of the price and crowd. The Texas music circuit from Austin to Luckenbach to Fredericksburg is the origin story Nashville has been marketing for 30 years. That argument hasn\'t been made to the Midwest market yet.'
      },
      louisiana:{idx:10,famgap:4,tags:'Culture rival · Food · Fall event',s:['Texas\'s fall portfolio is dramatically more varied than New Orleans — the State Fair alone draws 2.5 million visitors and represents cultural programming New Orleans can\'t match at the same scale','Texas\'s food culture in fall has national credibility across multiple cities; New Orleans\'s food scene, though excellent, is concentrated in a single city experience','Texas Hill Country in October is a genuinely different fall experience from New Orleans\'s urban fall scene — the variety argument is decisive for a Midwest traveler investing in a flight'],w:['New Orleans Jazz Fest (late April/early May) bleeds into the cultural fall season — Voodoo Fest in October draws specifically from the Midwest market Texas is competing for','New Orleans\'s food reputation in fall specifically is extraordinary — the combination of cooler temperatures and the depth of Creole cuisine makes October in New Orleans one of the best food travel experiences in the US','For Midwest travelers, New Orleans has an emotional resonance and a sense of cultural permission (&quot;I can do anything here&quot;) that Texas\'s more sprawling identity can\'t replicate'],o:['Target Midwest travelers who\'ve done New Orleans in fall and want the next chapter — Texas\'s food circuit (Franklin BBQ, Houston\s James Beard scene) is the natural next trip','Position Fredericksburg\'s Oktoberfest programming as a specific Texas fall draw with genuine German heritage roots that can compete with New Orleans\'s cultural specificity on a different axis','The &quot;Texas BBQ pilgrimage&quot; as a fall food trip is a concept with national recognition that could anchor a Midwest fall marketing campaign'],t:['New Orleans\'s fall cultural calendar continues to develop — new events, festivals, and culinary programming keep it fresh for repeat Midwest visitors','Louisiana\'s food reputation specifically shows no signs of diminishing — James Beard recognition continues to flow to New Orleans restaurants at a disproportionate rate','The Midwest food traveler\'s loyalty to New Orleans is deep and often extends across multiple annual visits — it\'s a harder loyalty to displace than Nashville\'s more event-driven following'],take:'Louisiana wins on single-city cultural depth in fall. Texas wins on total variety. The Midwest traveler who\'s been to New Orleans in fall twice and wants something new has a compelling Texas answer — but that answer requires active storytelling about what Texas\'s fall actually is. The familiarity gap (assuming Texas in fall is hot, flat, and uneventful) is doing maximum damage to consideration here.'
      },
      arizona:{idx:5,famgap:5,tags:'Sun escape · Golf · Winter warmth',s:['Texas\'s fall/winter cultural experience is richer for the Midwest cultural traveler — State Fair, holiday markets, Austin music, San Antonio events give more cultural programming reasons than Arizona\'s scenery-dominant fall/winter','Texas pricing is generally lower than Scottsdale\'s fall/winter peak, which is Arizona\'s dominant season','Texas\'s multi-city variety means a Midwest traveler can do different things in multiple Texas cities without the trip feeling repetitive'],w:['Arizona\'s fall/winter weather (70–80°F, reliably sunny) is its dominant competitive asset and is hard to argue against for Midwest travelers fleeing November–February cold','Scottsdale\'s luxury golf and spa market is world-class and specifically marketed at the Midwest affluent traveler','The Sedona red rock landscape in fall is extraordinary — its visual distinctiveness is among the most shareable in US destination imagery'],o:['Texas\'s Big Bend in fall/winter is the most direct answer to Arizona\'s landscape draw — the Chisos Mountains in October rival Sedona for dramatic desert landscape and is orders of magnitude less crowded','Position Texas\'s fall/winter as the surprise season: cooler than expected, culturally rich, and vastly underexplored compared to the traveler\'s mental image of a Texas trip','The Midwest traveler who has done Scottsdale in fall/winter and wants something beyond resort comfort has a Texas adventure answer that hasn\'t been told to them'],t:['Arizona\'s &quot;Vibrant Arizona&quot; 2025 campaign is specifically designed to capture the Midwest fall/winter market — it\'s well-funded and newly active','Scottsdale\'s golf resort market from the Midwest is entrenched business travel — the corporate golf trip to Arizona is a fixed behavior pattern','Sedona\'s growing wellness travel draw specifically targets the Midwest wellness traveler in fall/winter, a segment Texas hasn\'t developed a clear answer for'],take:'Arizona wins the Midwest fall/winter sun-and-resort market. Texas\'s competitive window is the Midwest traveler who wants Big Bend\'s wilderness experience or the Hill Country\'s cultural depth — both of which are available in October–February and genuinely competitive with what Arizona offers in the same season. The problem is that nobody has told the Midwest traveler that fall/winter is actually the best time to experience the Texas product that would change their mind.'
      },
      caribbean:{idx:-10,famgap:2,tags:'Winter sun · All-inclusive · Fly market',s:['Texas offers more active, discovery-oriented fall/winter travel for Midwest cultural travelers who want to use their vacation time rather than collapse on a beach','Texas pricing for a fall/winter trip is lower than all-inclusive Caribbean resort pricing when total trip cost is calculated honestly','Texas\'s cultural depth (multiple cities, diverse experiences) gives a Midwest traveler more to show for their trip than a resort week in Cancun'],w:['Caribbean all-inclusive resorts provide a specific psychological function — the permission to stop doing everything — that Texas, as a discovery destination, cannot replicate','Caribbean warmth (80–85°F, turquoise water) creates a sensory promise that no Texas destination can match','For Midwest travelers in November through February, the Caribbean\'s warmth argument is nearly irresistible — the contrast with 25°F Chicago or 30°F Cincinnati is the marketing itself'],o:['Target Midwest travelers for whom Caribbean all-inclusives feel passive and unsatisfying — the growing segment that wants to use their vacation time for something they can tell a story about','Texas\'s fall/winter itineraries (Big Bend + Marfa + West Texas) are inherently story-generating in a way that a resort week is not — lean into that for the Midwest traveler who wants to come back with something to say','Position Texas as the fall/winter trip for travelers who don\'t want to recover from their vacation — the active alternative to the all-inclusive model'],t:['Caribbean resorts have refined the all-inclusive value proposition to a degree that makes it genuinely difficult to compete on price or ease','The Midwest winter escape to the Caribbean is generational — it\'s how Midwest families have been managing February for decades','Direct Caribbean flight expansion from Midwest cities (Chicago, Atlanta, Charlotte) has made Caribbean winter trips increasingly accessible'],take:'Caribbean and Texas serve fundamentally different fall/winter needs from the Midwest market. Caribbean wins when the traveler wants to stop; Texas wins when they want to discover. The competitive opportunity is the growing segment of Midwest travelers for whom the Caribbean all-inclusive has lost its appeal — and there are more of them than Travel Texas is currently reaching.'
      }
    }
  },
  coastalfly:{
    spring:{
      utah:{idx:5,famgap:7,tags:'Southwest parks · Road trip · Outdoor spring',s:['Texas\'s spring variety — Hill Country wildflowers, Gulf Coast birding migration, Big Bend desert bloom — is as spectacular as Utah\'s parks in spring and dramatically less crowded','Texas\'s small town infrastructure (Fredericksburg, Marfa, Wimberley) is significantly more developed than Utah\'s park gateway towns for the coastal traveler who wants hotel comfort alongside the outdoor experience','Texas does not require permits for most of its outdoor experiences in spring — Arches requires reservations and Zion\'s Angels Landing has a lottery system that adds friction for casual planners','Texas BBQ and food culture gives the coastal fly market a specific food draw alongside the outdoor experience that Utah\'s parks circuit doesn\'t offer at the same quality'],w:['Utah\'s &quot;Mighty Five&quot; campaign is one of the most successful destination brand campaigns in US history — Arches, Zion, Bryce, Canyonlands, and Capitol Reef are globally iconic','For LA and San Francisco travelers, Utah is either a drive trip (SLC direct flights are excellent from coastal cities) or a short flight — access is highly competitive with Texas','Zion\'s canyon hiking and Bryce\'s hoodoos create visual social media content that Texas\'s spring landscapes haven\'t matched in terms of global reach','Utah\'s parks circuit is one of the most efficient multi-park road trips in the world — a week covers more iconic landscapes than any comparable Texas route'],o:['Texas\'s wildflower season should be positioned directly against Utah\'s spring as an equally visual but dramatically less discovered experience — a coastal traveler who gets to Big Bend in April will compare it to Moab, not to their expectations of Texas','The Trans-Pecos circuit (Big Bend + Marfa + Davis Mountains + Guadalupe Mountains) is a genuinely competitive southwest road trip alternative to the Utah parks circuit that has never been marketed to the coastal fly market','Target coastal travelers who\'ve done Zion and Arches (a large and growing cohort) and want the next undiscovered chapter of the southwest outdoor story'],t:['Utah\'s permit system creates frustration but paradoxically reinforces the brand\'s desirability — travelers who get the permit feel rewarded; Texas\'s open-access parks don\'t have that scarcity signal','The &quot;Mighty Five&quot; campaign continues to drive coastal visitation at a scale that Texas\'s statewide marketing hasn\'t matched for the outdoor travel segment','Utah direct flight connectivity from LA and San Francisco is excellent and often competitively priced with Texas flights'],
      take:'Utah wins the coastal spring parks market on brand recognition and iconic visual identity. Texas\'s competitive argument is exactly what the pitch brief outlines: travelers who\'ve done Utah and want the next chapter of the southwest discovery story haven\'t been told that the Trans-Pecos circuit exists. The familiarity gap is enormous — and closing it with the coastal fly market would produce meaningful economic impact across West Texas communities that currently see almost no coastal visitor traffic.'
      },
      newmexico:{idx:20,famgap:6,tags:'Southwest culture · Authenticity · Drive from TX',s:['Texas\'s total portfolio is vastly richer than New Mexico for a coastal traveler investing in a long flight','Texas\'s food culture (multiple James Beard-recognized scenes in Houston, Austin, and San Antonio) is more nationally recognized than New Mexico\'s food circuit for the coastal food traveler','Texas\'s arts scene in fall (Marfa, Austin, Houston Museum District) is increasingly competitive with Santa Fe\'s arts circuit and more varied geographically','Texas major airport access (DFW and IAH are major international hubs) gives it superior connectivity to coastal cities vs. Albuquerque'],w:['New Mexico True\'s authenticity brand is exceptionally well-crafted — Santa Fe and Taos deliver a culturally specific experience the coastal traveler deeply values','White Sands\' otherworldly landscape creates a level of visual surprise that Texas\'s parks don\'t match for a coastal traveler\'s first visit','The coastal market\'s &quot;authentic Southwest&quot; mental model often defaults to New Mexico rather than Texas — the cultural associations are stronger','Meow Wolf in Santa Fe has become a specific arts/culture draw for the coastal creative class that Texas hasn\'t matched with a comparable single attraction'],o:['Marfa\'s combination of Donald Judd\'s Chinati Foundation, Prada Marfa, and the specific cultural mystique of the high desert is a directly competitive arts destination for the LA and SF creative traveler who has already been to Santa Fe','Position the Trans-Pecos arts circuit as Texas\'s answer to New Mexico\'s arts-and-landscape combination — it\'s the same category of experience with a different and equally compelling cultural character','Target coastal cultural travelers who\'ve been to Santa Fe twice and want the next version of the authentic Southwest — Texas has a credible and underdiscovered answer'],t:['New Mexico True\'s 2025 9:1 ROI confirms the campaign is working and well-targeted at markets that include coastal cities','Santa Fe\'s international arts market and Georgia O\'Keeffe Museum give it cultural credentialing that Marfa is building toward but hasn\'t yet matched','New Mexico\'s &quot;Land of Enchantment&quot; tagline carries genuine resonance with the coastal market\'s appetite for authentic cultural experiences'],
      take:'New Mexico wins the coastal cultural/authenticity market on focused identity. Texas wins on scale when the traveler is ready to explore. Marfa is Texas\'s single strongest competitive asset against New Mexico for the coastal creative class — a destination with genuine international arts credibility that is known primarily to insiders. Closing that discoverability gap with the LA and SF market would represent one of the highest-return investments in the entire competitive landscape.'
      },
      tennessee:{idx:10,famgap:5,tags:'Music culture · City visit · Southern',s:['Texas\'s outdoor component gives it a dimension that Nashville\'s purely urban offering can\'t match for the coastal traveler who wants landscape alongside culture','Texas\'s food scene in multiple cities is increasingly competitive with Nashville\'s nationally recognized dining scene','Texas\'s arts and music culture (Austin, Houston\'s Museum District) is peer-level to Nashville\'s music identity for the coastal traveler who investigates beyond the surface','Texas flight frequency from coastal cities is excellent — Dallas and Houston are major hubs with competitive coastal connectivity'],w:['Nashville\'s &quot;Sounds Perfect&quot; brand is clean, emotionally compelling, and has very high awareness with coastal travelers who follow food and music travel media','The coastal market\'s bachelorette and social travel segment treats Nashville as a default — this is cultural embedding that Texas hasn\'t replicated','Nashville\'s hospitality infrastructure has grown significantly — boutique hotels, recognized restaurants, and the local brand have all matured in the last five years','For West Coast travelers, Nashville\'s directness from LA and San Francisco is competitive with Texas'],o:['Target coastal travelers who\'ve done Nashville and want the next chapter of the Southern cultural discovery trip — Texas\'s music heritage (Sixth Street, ACL, Luckenbach) is a credible next level','Position Austin as Nashville for people who want more: mountains nearby (well — Hill Country), better weather, and a music culture that is more rooted in the live music ecosystem that created country','The coastal foodie who\'s been to Nashville for restaurants is a high-probability Texas discovery audience — Houston\'s James Beard attention and Austin\'s restaurant density is now comparable to Nashville for serious food travelers'],t:['Nashville\'s social media footprint with coastal travelers is extremely strong — it generates more user-created content from the LA/SF demographic than almost any other US destination','Tennessee\'s overall tourism marketing has grown more sophisticated — &quot;Sounds Perfect&quot; is legitimately strong work that competes effectively for the coastal cultural travel budget','Nashville\'s development pipeline (new hotels, restaurants, venues) keeps it culturally fresh for repeat coastal visitors who might otherwise consider alternatives'],take:'Tennessee and Texas are competing for the coastal cultural traveler\'s South and Southwest exploration budget. Tennessee wins on brand clarity and social media virality. Texas wins on total variety and the outdoor chapter Nashville can\'t offer. The pitch brief\'s platform is particularly relevant here: a coastal traveler who\'s done Nashville and thinks they know what the South offers hasn\'t yet discovered the version of Texas that would change their mental map of American travel.'
      },
      charleston:{idx:15,famgap:4,tags:'Southern charm · Coastal culture · Weekend fly',s:['Texas\'s total variety is categorically larger than Charleston/Savannah as a destination for a coastal traveler investing in a 5-hour flight','Texas\'s outdoor chapter (Big Bend, Hill Country) is entirely absent from the Charleston/Savannah experience — for the coastal traveler who values landscape, Texas has a dimension Charleston simply doesn\'t offer','Texas\'s food scene (Houston especially) has James Beard-level recognition that coastal food travelers increasingly know about — it\'s a credible competitor to Charleston\'s Lowcountry cuisine on a multi-city trip','Texas pricing for accommodation and dining is generally lower than Charleston\'s premium boutique hotel market in peak season'],w:['Charleston is among the most visually distinctive small cities in the US — its pastel antebellum streetscapes and Spanish moss aesthetic are immediately compelling on social media for coastal travelers who value aesthetic photography','For SF and LA travelers who follow food media, Charleston\'s restaurant scene has extraordinary prestige — the Sean Brock legacy and multiple James Beard awards give it coastal credibility that Texas\'s multi-city food story sometimes obscures','Coastal travelers often choose Charleston/Savannah specifically for a slower pace than their home city — Texas\'s energy and scale can work against it for travelers seeking decompression','Charleston\'s walkability and compact charm is specifically appealing to coastal urbanites who want a city experience without LA\'s or NY\'s overwhelming scale'],o:['Target coastal travelers who\'ve done Charleston and want to scale up — Texas\'s combination of cultural depth, outdoor scale, and food excellence is the natural &quot;next level&quot; of the same discovery impulse','Marfa\'s aesthetic specificity (Donald Judd minimalism against Chihuahuan Desert) is a direct answer to Charleston\'s architectural beauty for the coastal design-conscious traveler — it just requires active discovery','Houston\'s Museum District and its diversity of world-class cultural institutions is a coastal urbanite\'s city experience that rivals Charleston on cultural depth and dramatically surpasses it on scale'],t:['Charleston\'s social media aesthetic is extremely powerful with the LA and SF design and food travel communities — it generates disproportionate consideration relative to its size','The coastal market\'s &quot;underrated Southern gem&quot; discovery impulse currently runs through Charleston and Savannah rather than through Texas\'s secondary destinations','Food media\'s continued coverage of Charleston and Savannah keeps them front of mind for the coastal food traveler who reads Eater, Food52, and Bon Appétit'],take:'Charleston wins the coastal aesthetic and charm market. Texas wins on scale and outdoor variety. The coastal traveler who\'s been to Charleston and wants the next discovery is a specific and addressable audience — and Marfa, in particular, is the Texas destination with the aesthetic credibility to convert them. The familiarity gap is severe: Charleston is frequently on the &quot;most underrated city&quot; lists that reach coastal travelers; Texas rarely appears in those same editorial conversations.'
      }
    ,
      california:{idx:-15,famgap:9,tags:'Home state rival · Iconic · Domestic parks',
        s:['Texas spring wildflower season is genuinely unknown to most California travelers — the Hill Country in bloom is as visually dramatic as anything California offers in spring and draws none of the crowds','Texas is dramatically less expensive than California for accommodation, food, and daily costs — a comparable spring trip runs 30–40% cheaper in Texas','Big Bend and the Trans-Pecos circuit offers the California coastal or Bay Area traveler a desert Southwest experience without the Mojave\'s overexposure or Joshua Tree\'s parking-lot crowds','Texas\'s spring weather in the Hill Country and West Texas is reliably excellent — no California coastal fog, no Sierra snowpack uncertainty, no Yosemite permit lottery'],
        w:['California is the default domestic travel frame for most California residents — they know it intimately and can execute a trip without the planning overhead Texas requires','Yosemite, Big Sur, Napa, and Joshua Tree carry iconic status that no Texas destination currently matches in the coastal consciousness','California\'s coastal spring wildflower season (Antelope Valley, Anza-Borrego Desert bloom) competes directly with Texas\'s wildflower season and is far better known to the target audience','For the West Coast traveler, California is free beyond gas — no flight required, zero marginal entry cost, deeply familiar'],
        o:['The California wildflower visitor who crowds Antelope Valley in March and finds gridlocked parking lots is a specific and growing audience primed for a Texas Hill Country discovery — the same bloom, the same scale, without the crowds','Position Big Bend and the Trans-Pecos as the California traveler\'s alternative desert Southwest — the version without Instagram queues at Joshua Tree or permit chaos at Zion','Target Bay Area and LA travelers who follow food and arts media and have already been told about Marfa — the discovery infrastructure exists, it just needs amplification at scale'],
        t:['California\'s home advantage is structurally unbeatable for the casual trip — it requires zero persuasion, zero flight, and zero discovery for the traveler who already lives there','Visit California\'s marketing budget is one of the largest state tourism budgets in the US and it specifically targets Californians for in-state travel','The California state parks system, national parks circuit, and coastal highway infrastructure are world-class and require no flight investment to access'],
        take:'California and Texas are best positioned internationally as complements rather than competitors — but Travel Texas should be explicit and proactive about building that two-state narrative with international tour operators and booking platforms. California is the Pacific chapter of the American story: coast, Hollywood, wine country, tech culture. Texas is the Western chapter: the live music city that invented the genre, the food city that rivals any in the country, the border culture that exists nowhere else, the landscape that international travelers have never placed on their mental map. International travelers who combined a California trip with Texas during the 2026 World Cup proved the two-state itinerary works — and that audience now exists as a re-marketable base of international visitors who experienced Texas for the first time group stage already have the architecture of the trip built. Travel Texas\'s job is to fill in the Texas days with a narrative they didn\'t know they needed.'}
    },
    summer:{
      colorado:{idx:-10,famgap:8,tags:'Mountain escape · Summer outdoor',s:['Texas flight prices from coastal cities are often competitive with Denver flights — total trip cost for a similar trip length is sometimes comparable','Texas\'s Gulf Coast summer offers warm water beach access that Colorado\'s inland summer can\'t provide','Texas\'s summer cultural programming (Austin music, Houston arts season) gives the coastal cultural traveler reasons to visit that Colorado\'s outdoor-dominant summer can\'t match for non-hikers'],w:['Colorado\'s summer is its strongest competitive window for the coastal fly market — mountain air, wildflower meadows, and 70°F highs are almost impossible to argue against when the coastal traveler is leaving 95°F LA or 85°F SF','Colorado\'s &quot;Colorado Magic&quot; 2024 campaign has specifically targeted coastal markets with summer content and has high awareness with the LA and SF outdoor travel community','Vail, Aspen, and Telluride\'s summer festival circuits give Colorado a cultural summer chapter (jazz festivals, food and wine, film) that competes with Texas\'s cultural summer for the coastal traveler'],o:['Texas\'s Gulf Coast summer is the coastal fly market\'s closest &quot;affordable beach&quot; option — for LA travelers who don\'t want to fly to Florida, Port Aransas is a genuinely different Gulf experience worth positioning directly','Target coastal travelers for whom Colorado hiking is physically demanding and who want a culturally immersive summer trip — Texas\'s BBQ circuit and Austin music are accessible for any fitness level','Big Bend at very high elevation sections (Chisos Mountains, 7,800ft) is actually reasonable in early June before peak heat — that\'s a completely unknown fact for the coastal market'],t:['Colorado\'s summer brand with the coastal fly market is exceptionally strong — it carries a prestige and outdoor credibility that Texas can\'t match on those specific terms','Aspen\'s summer festival circuit (food, wine, music) specifically targets and reaches the high-value LA and SF traveler — it competes directly with what coastal travelers might find in Austin or Houston','Colorado\'s Sundance migration (since 2027 in Boulder) will increasingly tie coastal entertainment industry travelers to Colorado as a summer destination'],take:'Colorado wins coastal summer. Texas\'s realistic argument for the coastal summer market is the Gulf Coast beach experience and cultural summer programming — a different trip than Colorado, not a competitive one. The pitch brief\'s framework applies: the coastal summer traveler who\'s done Colorado four times and wants something genuinely new hasn\'t been given a Texas summer story that makes them look twice.'
      },
      pnw:{idx:0,famgap:7,tags:'Cool escape · Outdoor · Cultural cool',s:['Texas flight prices from LA and SF are often lower than Seattle and Portland — direct Texas flights have high competition and frequency from coastal hubs','Texas\'s food and cultural summer (Austin, Houston) is increasingly peer-level to Portland\'s culinary scene for the coastal traveler who investigates before they book','Texas\'s Gulf Coast summer offers warm water swimming that the PNW\'s cold Pacific coast fundamentally cannot provide — for the coastal traveler who wants beach and warmth, Texas is the answer the PNW isn\'t'],w:['PNW\'s cool coastal summers are their dominant draw for LA and SF travelers — Seattle\'s 75°F July vs. Dallas\'s 102°F July is an argument Texas cannot win if weather is the deciding factor','Portland and Seattle\'s culinary and creative culture scenes have very high prestige with coastal travelers — they carry the &quot;progressive, creative, food-forward&quot; identity that LA and SF travelers specifically value','Mount Rainier, Olympic Peninsula, and Cascades give PNW a dramatic natural backdrop that Texas\'s Gulf Coast doesn\'t match for the coastal traveler already surrounded by Pacific Ocean access','For coastal travelers, the PNW is perceived as a more culturally aligned destination — shared values around food, environment, and creativity'],o:['Texas\'s summer Gulf Coast warmth is the specific thing the PNW cannot offer coastal travelers — position it directly as the answer to the traveler who loves Portland\'s food but wants to also swim in warm water','Target LA and SF travelers who\'ve done Portland and Seattle and want a genuinely different American city culture — Houston\'s diversity, scale, and food scene is nothing like what coastal travelers expect from Texas','Austin\'s outdoor music culture and &quot;weird&quot; creative identity has some structural overlap with Portland\'s cultural identity — that connection has never been made explicitly to coastal creative travelers'],t:['PNW\'s brand prestige with coastal travelers is at peak — Portland especially carries a cultural cachet that Texas has not matched with under-40 coastal travelers','Environmental values alignment makes PNW a more comfortable destination for many coastal travelers than a Texas perceived to be politically and culturally distant','Wildfire smoke affects both regions but Oregon and Washington\'s communication around it is more developed and less likely to create negative surprise'],take:'PNW and Texas are competing for the coastal cultural summer trip. PNW wins on cool weather, environmental values alignment, and cultural prestige. Texas wins on warmth, food diversity, and the sheer surprise of what Houston and Austin actually offer. The familiarity gap here is almost entirely a brand and values perception problem — coastal travelers who think they know Texas haven\'t discovered the version that would make them comfortable reconsidering.'
      },
      montana:{idx:5,famgap:6,tags:'Wild outdoor · Remote · Bucket list',s:['Texas is a shorter and simpler flight from coastal cities than Montana — Glacier\'s airports are poorly served from LA and SF; Texas\'s major hubs offer excellent direct connectivity','Texas\'s variety of experiences means a longer trip has more to fill — a week in Montana is concentrated in and around Glacier; a week in Texas can cover Big Bend, Marfa, the Hill Country, and Houston','Texas\'s infrastructure is significantly more developed — better accommodation, better food, less logistical risk than Glacier\'s more remote gateway communities','Texas doesn\'t require the same physical preparation and gear investment that a serious Glacier trip demands'],w:['Glacier National Park\'s scenery is genuinely extraordinary — the Crown of the Continent designation and the &quot;see it before the glaciers disappear&quot; urgency creates bucket-list demand that Texas can\'t replicate','Montana\'s &quot;Last Best Place&quot; positioning carries powerful resonance with the coastal outdoor market — its wilderness perception is at peak','Going-to-the-Sun Road is a genuinely iconic scenic drive experience that no Texas equivalent matches in terms of immediate visual impact','The coastal market\'s &quot;unspoiled wilderness&quot; premium is a real purchase driver and Montana delivers on it more credibly than Texas'],o:['Big Bend\'s own version of bucket-list urgency exists and is underleveraged — it\'s the least-visited major national park in the contiguous US, genuinely remote, and genuinely spectacular in a way that requires active discovery','Target coastal outdoor travelers who find Montana\'s logistics increasingly difficult (Glacier permit nightmares, limited accommodation, inaccessible peak dates) — Big Bend in November–March is accessible, dramatic, and far less crowded','Position Guadalupe Mountains as an underrated alternative for the coastal hiker who wants high-altitude desert wilderness without Montana\'s logistical complexity'],t:['Glacier\'s &quot;see it before it\'s gone&quot; urgency creates a type of demand that is almost entirely immune to competitive argument — travelers feel compelled to go before conditions deteriorate further','Montana\'s &quot;Last Best Place&quot; brand continues to grow as coastal migration to Montana creates a network of advocates and repeat visitors','Glacier\'s social media reach is disproportionate to its visitation numbers — it consistently generates extraordinary shareable content that keeps it in coastal travelers\' aspiration lists'],take:'Montana wins on wilderness prestige and bucket-list urgency for the coastal outdoor market. Texas wins on access and logistics. For the coastal traveler who finds Montana increasingly difficult to book and experience as it was, Big Bend is the most credible alternative — but almost nobody has been told to think of it that way. This is the clearest example of the pitch brief\'s core argument: Texas\'s most compelling competitive asset (Big Bend) is systematically underdiscovered because familiarity with Texas prevents travelers from imagining it.'
      },
      hawaii:{idx:-25,famgap:1,tags:'Tropical · Aspirational · Long summer',s:['Texas is dramatically less expensive than Hawaii — flights, accommodation, and daily costs make a comparable-length Texas trip 40–60% less expensive','Texas\'s summer cultural experience is more active and varied than Hawaii\'s beach-dominant product for coastal travelers who want to do more than relax','Texas doesn\'t require the 5–6 hour flight that even LA-based travelers face to reach Hawaii'],w:['Hawaii is in a completely different aspirational category — the coastal market\'s affinity for Hawaii is deep and not easily addressed through a competitive argument','Hawaii\'s tropical landscape, volcanic scenery, and marine environment offer something Texas fundamentally cannot — genuine otherness from the California and Pacific experience the coastal traveler already has','The &quot;I\'m going to Hawaii&quot; social statement carries currency that &quot;I\'m going to Texas&quot; does not for a LA or SF traveler communicating their vacation choice','Hawaii\'s food scene (poke, plate lunch, celebrity Hawaiian food movement) has national recognition with coastal travelers that creates a specific food draw'],o:['Texas and Hawaii don\'t compete directly in the coastal summer market — the opportunity is Hawaii-fatigued coastal travelers who find the expense and crowds of post-pandemic Hawaii less satisfying','Target the specific coastal traveler for whom Big Bend\'s remoteness and quiet is the antidote to Maui\'s crowds and prices — these are different products for a traveler who has evolved beyond Hawaii\'s promise','Texas as a &quot;vacation from your vacation&quot; — less expensive, more active, and more culturally rich than a Hawaii resort week for coastal travelers ready for that evolution'],t:['Hawaii\'s brand with coastal travelers is essentially immune to competitive argument from Texas — the aspirational gap is too large','Post-pandemic revenge travel to Hawaii has been strong despite dramatically higher prices — the coastal market\'s Hawaii loyalty is deeply embedded and demand is relatively inelastic','Hawaii\'s new marketing efforts to address overtourism concerns may actually make it more appealing to the coastal market, not less'],take:'Hawaii and Texas don\'t compete for the coastal summer market. The realistic opportunity is the small but growing segment of coastal travelers for whom Hawaii has become too expensive or too crowded and who haven\'t yet discovered what Big Bend or the Texas Hill Country offers. That audience exists, is growing, and is underserved — but converting them requires a Texas discovery story that doesn\'t exist yet at the volume that would reach them.'
      }
    ,
      california:{idx:-20,famgap:8,tags:'Home state rival · Coast · Summer default',
        s:['Texas Gulf Coast summer is warm-water beach access without a 5-hour flight from the Bay Area or LA — for coastal Californians who want Gulf heat and fishing culture, Texas coast is a genuinely different experience','Texas\'s summer cultural programming (Austin music, Houston arts) gives the California cultural traveler something California\'s beach-dominant summer doesn\'t offer in the same combination','Texas pricing in summer is meaningfully lower than California\'s peak coastal season — Big Sur accommodation in July is extraordinarily expensive; Texas coast is not'],
        w:['California summer is the dominant default for California residents — Big Sur, Lake Tahoe, the Sonoma coast, and the Eastern Sierra are all within a day\'s drive with zero flight cost','California\'s variety of summer landscapes (coast, mountains, high desert, wine country) within a single state is nearly unmatched — a California road trip covers more terrain types than most states can offer','The coastal California traveler\'s summer is tied to the Pacific — surfing, kayaking, cold-water coastal culture — which Texas\'s Gulf Coast cannot replicate on those specific terms','For Northern California travelers, Tahoe is a 3-hour drive; the Sierra Nevada is world-class hiking without a flight; Texas summer requires committing to a 3+ hour flight and 100°F heat'],
        o:['Texas summer heat is a real barrier — but the specific Texas summer story (Gulf fishing, Hill Country evenings, Austin live music outdoors) is a genuinely different experience from California\'s coastal summer and has never been told to the California market','The California traveler who has done Tahoe every summer for ten years and finds it overcrowded is a growing audience — they are ready for something different and haven\'t been given a Texas summer story that speaks to them','Port Aransas and South Padre\'s warm Gulf water and drive-on beach culture is nothing like what California offers — for the California traveler who wants heat and water without Pacific cold, Texas coast is the answer they haven\'t heard'],
        t:['California\'s summer home advantage is almost impossible to compete with from a cost and convenience standpoint — no state can win this argument against a Californian\'s own backyard','Visit California\'s summer campaign specifically targets Californians for in-state travel and is backed by a very large budget','California\'s Eastern Sierra (June Lake, Mammoth, Lone Pine) gives the California traveler mountain escape, wildflowers, and lakes within a 5–6 hour drive — Texas mountain equivalent requires a flight plus a long drive to the Guadalupe Mountains'],
        take:'Texas loses California summer almost entirely — a Californian taking a domestic summer trip has no logical reason to fly to Texas when Big Sur, Tahoe, and the Eastern Sierra are in their backyard. The honest play is not to compete for the standard summer trip but to identify the specific California summer traveler who has exhausted their own state and position the Texas Gulf Coast and music culture as a genuinely different experience. That is a small but growing audience and the familiarity gap is enormous — California travelers who discover Port Aransas in August are almost always genuinely surprised it exists.'}
    },
    fallwinter:{
      florida:{idx:-5,famgap:4,tags:'Sun escape · Winter · Holiday',s:['Texas cultural programming in fall/winter (State Fair, holiday markets, New Year\'s events in multiple cities) is richer for the coastal traveler who wants cultural depth alongside warmth','Texas pricing in fall/winter is lower than Florida\'s peak season — accommodation in Houston and Austin in November is significantly less expensive than Miami Beach or Naples','Texas\'s food scene in fall/winter (Houston especially) offers a level of culinary variety and quality that competes with Miami\'s food scene for the coastal food traveler'],w:['Florida\'s winter is its peak season for the coastal fly market and its marketing around that is substantial and well-funded','Miami\'s winter cultural identity (Art Basel in December, music scene, nightlife) specifically attracts the LA and SF creative class in ways that Texas\'s fall/winter programming doesn\'t match','Florida\'s warmth and beach access in November–February is its dominant and nearly unassailable competitive advantage for coastal travelers seeking sun escape'],o:['Texas\'s Big Bend in November through March is peak season — position it directly at the coastal traveler who does Art Basel Miami in December and hasn\'t discovered what Big Bend is in January','San Antonio\'s River Walk in December is one of the most beautiful holiday experiences in the US and is almost entirely unknown to the coastal market — it should be a specific coastal marketing target','Houston\'s Museum District and Ensemble/Theatre Row give it a world-class cultural winter experience that competes directly with what coastal travelers find in Miami'],t:['Florida\'s Art Basel December brings the exact coastal creative class audience that Texas needs to reach — the cultural competition for this specific segment is direct and Miami has a significant head start','Florida\'s warm winter weather combined with its cultural programming makes it a peer competitor for the coastal traveler who wants both sun and culture — a combination Texas doesn\'t communicate as clearly','California coastal travelers increasingly view Florida as their primary warm winter escape, and that habit is reinforced by extensive direct flight options'],take:'Florida wins the coastal winter sun market. Texas\'s competitive window is the coastal cultural traveler who wants Big Bend\'s wilderness winter, Houston\'s culinary depth, or San Antonio\'s holiday authenticity alongside warmth. Those are specifically and honestly undermarketed experiences that would compete if the coastal market knew to look for them.'
      },
      caribbean:{idx:-15,famgap:2,tags:'Winter sun · All-inclusive · Escape',s:['Texas offers more cultural depth for a coastal traveler who values discovery over relaxation','Texas pricing is lower than most Caribbean all-inclusive resorts for a comparable length trip','Texas doesn\'t require leaving the US or dealing with international logistics'],w:['The Caribbean all-inclusive product for the coastal winter traveler serves a specific psychological need — permission to stop being productive — that Texas as a discovery destination genuinely cannot replicate','Caribbean warm water and beach access in January and February creates a sensory escape that no Texas destination can match','For coastal travelers who work in high-intensity environments (tech, finance, entertainment industry), the Caribbean\'s complete disconnection is a specific and valued product'],o:['Target coastal travelers who find Caribbean all-inclusives passive and unsatisfying — a growing segment among the 35–50 coastal demographic who want their vacation time to produce memories and stories','Texas\'s fall/winter should be positioned as the &quot;active&quot; alternative to the Caribbean\'s &quot;passive&quot; model — Big Bend hiking, Hill Country food touring, and Houston cultural exploration produce better memories than a resort pool'],t:['Caribbean resort pricing has become more competitive and the all-inclusive model has refined its value proposition — it\'s harder to argue against on a cost-per-satisfaction basis than it was five years ago','Coastal travelers who choose Caribbean all-inclusives are not making a comparison decision — they are making a need-based decision that Texas\'s product can\'t address'],take:'Caribbean and Texas winter serve genuinely different coastal traveler needs. The realistic competitive opportunity is the coastal traveler for whom the passive all-inclusive has lost its appeal — an audience that exists and is growing but requires an active discovery message to reach. Texas needs to make them see the trip before they default to Cancun.'
      },
